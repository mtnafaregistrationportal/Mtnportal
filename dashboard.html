<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MTN AFA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-yellow: #FFD700;
            --dark-bg: #0a1628;
            --dark-bg-gradient: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --text-light: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.6);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg-gradient);
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        .dash-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10, 22, 40, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .dash-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dash-icon {
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .dash-icon svg {
            width: 20px; height: 20px;
            color: var(--primary-yellow);
        }
        .profile-pic-small {
            width: 40px; height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-yellow);
        }
        .dash-header-text h2 {
            font-size: 16px; font-weight: 700;
        }
        .dash-header-text p {
            font-size: 12px;
            color: var(--text-muted);
        }
        .menu-btn {
            width: 40px; height: 40px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            z-index: 110;
        }
        .menu-btn span {
            width: 20px;
            height: 2px;
            background: var(--text-white);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .menu-btn.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
        .menu-btn.active span:nth-child(2) { opacity: 0; }
        .menu-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }
        
        .side-menu {
            position: fixed;
            top: 0; right: -300px;
            width: 280px; height: 100vh;
            background: rgba(10, 22, 40, 0.98);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            z-index: 100;
            transition: right 0.3s ease;
            padding: 80px 24px 24px;
        }
        .side-menu.open { right: 0; }
        .side-menu-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99; display: none;
        }
        .side-menu-overlay.show { display: block; }
        .menu-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 0;
            color: var(--text-light);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .menu-item:hover { color: var(--primary-yellow); }
        .menu-icon { width: 24px; height: 24px; }
        
        .dash-content {
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
        }
        .profile-upload-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-upload-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 12px;
        }
        .profile-pic-dash {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-yellow);
            display: block;
        }
        .profile-pic-placeholder-dash {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 3px solid var(--primary-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .profile-pic-placeholder-dash svg {
            width: 40px;
            height: 40px;
            color: var(--text-muted);
        }
        .change-pic-btn-dash {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 32px;
            height: 32px;
            background: var(--primary-yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid var(--dark-bg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .change-pic-btn-dash svg {
            width: 16px;
            height: 16px;
            color: #1a1a1a;
        }
        .change-pic-btn-dash input[type="file"] {
            display: none;
        }
        .welcome-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .welcome-card h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .welcome-card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .btn-row {
            display: flex;
            gap: 12px;
        }
        .btn-black {
            flex: 1;
            padding: 14px;
            background: #1a1a1a;
            color: white;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }
        .btn-yellow-full {
            flex: 1;
            padding: 14px;
            background: var(--primary-yellow);
            color: #1a1a1a;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }
        .info-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .info-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .btn-yellow-block {
            width: 100%;
            padding: 14px;
            background: var(--primary-yellow);
            color: #1a1a1a;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: block;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .status-pending { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
        .status-approved { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .status-rejected { background: rgba(244, 67, 54, 0.2); color: #F44336; }
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(10, 22, 40, 0.98);
            backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 12px;
            z-index: 50;
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            padding: 4px 12px;
            transition: color 0.3s ease;
        }
        .bottom-nav-item.active,
        .bottom-nav-item:hover {
            color: var(--primary-yellow);
        }
        .bottom-nav-item svg {
            width: 22px;
            height: 22px;
        }
        .tx-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tx-item:last-child { border-bottom: none; }
        .tx-left { display: flex; flex-direction: column; gap: 2px; }
        .tx-type { font-size: 14px; font-weight: 600; }
        .tx-date { font-size: 11px; color: var(--text-muted); }
        .tx-amount { font-size: 14px; font-weight: 700; }
        @media (min-width: 768px) {
            .dash-content {
                max-width: 520px;
                padding: 40px 24px;
            }
        }
    </style>
</head>
<body>
    <header class="dash-header">
        <div class="dash-header-left">
            <div class="dash-icon" id="headerIcon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <div class="dash-header-text">
                <h2>MTN AFA Portal</h2>
                <p id="welcomeText">Welcome, User</p>
            </div>
        </div>
        <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <div class="side-menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <a href="register.html" class="menu-item">
            <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            New Registration
        </a>
        <a href="orders.html" class="menu-item">
            <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            Orders
        </a>
        <a href="profile.html" class="menu-item">
            <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            Profile
        </a>
    </div>

    <div class="dash-content">
        <!-- Profile Picture Upload Section -->
        <div class="profile-upload-section">
            <div class="profile-upload-container">
                <div class="profile-pic-placeholder-dash" id="profilePicPlaceholderDash">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <img src="" alt="Profile" class="profile-pic-dash" id="profilePicDash" style="display: none;">
                <label class="change-pic-btn-dash" title="Change Profile Picture">
                    <input type="file" id="picInputDash" accept="image/*" onchange="uploadProfilePictureDash()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </label>
            </div>
        </div>

        <div class="welcome-card">
            <h2 id="greeting">Hello, User</h2>
            <p>Welcome back. Here is your account overview.</p>
            <div class="btn-row">
                <a href="register.html" class="btn-yellow-full">New Registration</a>
                <a href="orders.html" class="btn-black">My Orders</a>
            </div>
        </div>

        <div class="info-card">
            <div class="info-label">Total Registrations</div>
            <div class="info-value" id="totalRegistrations">0</div>
            <a href="register.html" class="btn-yellow-block">New AFA Registration</a>
        </div>

        <div class="info-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div class="info-label" style="margin: 0;">Recent Registrations</div>
                <a href="orders.html" style="font-size: 12px; color: var(--primary-yellow); text-decoration: none; font-weight: 600;">View All</a>
            </div>
            <div id="registrationList">
                <p style="color: var(--text-muted); text-align: center; padding: 20px;">Loading registrations...</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav-item active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            Home
        </a>
        <a href="register.html" class="bottom-nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            Register
        </a>
        <a href="orders.html" class="bottom-nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            Orders
        </a>
        <a href="profile.html" class="bottom-nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            Profile
        </a>
    </nav>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

        const SUPABASE_URL = "https://iqzjpdynmnucxswbrkho.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxempwZHlubW51Y3hzd2Jya2hvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMDY1OTksImV4cCI6MjA5NTc4MjU5OX0.Wro7xlYFR2zNIVitHSWI6itG5jPFYLMa2kpctGkY3QQ";

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('show');
            document.getElementById('menuBtn').classList.toggle('active');
        }
        window.toggleMenu = toggleMenu;

        async function uploadProfilePictureDash() {
            const file = document.getElementById('picInputDash').files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file.');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('Image must be less than 5MB.');
                return;
            }

            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) return;
                const userId = session.user.id;

                const fileExt = file.name.split('.').pop();
                const fileName = `${userId}_${Date.now()}.${fileExt}`;

                // Upload to 'avatars' bucket
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('avatars')
                    .upload(fileName, file, { upsert: true });

                if (uploadError) {
                    // If bucket doesn't exist, show helpful message
                    if (uploadError.message.includes('Bucket not found') || uploadError.message.includes('bucket')) {
                        alert('Storage bucket not found. Please create a "avatars" bucket in your Supabase dashboard under Storage.');
                        return;
                    }
                    throw uploadError;
                }

                const { data: { publicUrl } } = supabase.storage
                    .from('avatars')
                    .getPublicUrl(fileName);

                // Update users table with profile picture URL
                const { error: updateError } = await supabase
                    .from('users')
                    .update({ profile_picture: publicUrl })
                    .eq('id', userId);

                if (updateError) throw updateError;

                // Update auth user metadata
                await supabase.auth.updateUser({
                    data: { avatar_url: publicUrl }
                });

                // Show the picture immediately
                showProfilePicture(publicUrl);
                localStorage.setItem('profilePicture', publicUrl);

                alert('Profile picture updated!');
            } catch (error) {
                alert('Error uploading picture: ' + error.message);
            }
        }
        window.uploadProfilePictureDash = uploadProfilePictureDash;

        function showProfilePicture(url) {
            const img = document.getElementById('profilePicDash');
            const placeholder = document.getElementById('profilePicPlaceholderDash');
            const headerIcon = document.getElementById('headerIcon');
            
            img.src = url;
            img.style.display = 'block';
            placeholder.style.display = 'none';
            headerIcon.innerHTML = `<img src="${url}" class="profile-pic-small" alt="Profile">`;
        }

        async function loadDashboard() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                window.location.href = 'signin.html';
                return;
            }

            // REMOVED: Email verification check - users can access dashboard without verification
            // since we turned off "Confirm email" in Supabase settings

            const userId = session.user.id;
            const userName = session.user.user_metadata?.full_name || localStorage.getItem('userName') || 'User';

            document.getElementById('greeting').textContent = 'Hello, ' + userName;
            document.getElementById('welcomeText').textContent = 'Welcome, ' + userName;

            // Load profile picture from localStorage first (fast), then from DB
            const cachedPic = localStorage.getItem('profilePicture');
            if (cachedPic) {
                showProfilePicture(cachedPic);
            }

            // Load from database
            const { data: userRows, error: userError } = await supabase
                .from('users')
                .select('profile_picture, total_registrations')
                .eq('id', userId)
                .limit(1);

            if (!userError && userRows && userRows.length > 0) {
                const userData = userRows[0];
                
                if (userData.profile_picture) {
                    showProfilePicture(userData.profile_picture);
                    localStorage.setItem('profilePicture', userData.profile_picture);
                }
                
                document.getElementById('totalRegistrations').textContent = userData.total_registrations || 0;
            }

            // Load recent registrations
            loadRecentRegistrations(userId);
        }

        async function loadRecentRegistrations(userId) {
            const { data: registrations, error } = await supabase
                .from('registrations')
                .select('*')
                .eq('user_id', userId)
                .order('created_at', { ascending: false })
                .limit(2);

            const regList = document.getElementById('registrationList');
            
            if (error || !registrations || registrations.length === 0) {
                regList.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">No registrations yet</p>';
                return;
            }
            
            let html = '';
            registrations.forEach((reg) => {
                const status = reg.status || 'pending';
                const date = reg.created_at ? new Date(reg.created_at).toLocaleDateString('en-GB') : 'N/A';
                const name = reg.applicant_name || reg.name || 'AFA Registration';
                
                let statusClass = 'status-pending';
                let statusText = 'Pending';
                if (status === 'approved') { statusClass = 'status-approved'; statusText = 'Approved'; }
                if (status === 'rejected') { statusClass = 'status-rejected'; statusText = 'Rejected'; }
                
                html += `
                    <div class="tx-item">
                        <div class="tx-left">
                            <span class="tx-type">${name}</span>
                            <span class="tx-date">${date} • Ref: ${reg.id ? reg.id.substring(0,8) : 'N/A'}</span>
                        </div>
                        <div style="text-align: right;">
                            <div class="tx-amount" style="color: var(--primary-yellow);">GH₵ 15.00</div>
                            <span class="status-badge ${statusClass}" style="margin: 0; padding: 3px 10px; font-size: 11px;">${statusText}</span>
                        </div>
                    </div>
                `;
            });
            
            regList.innerHTML = html;
        }

        loadDashboard();
    </script>
</body>
</html>
