<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - MTN AFA Portal</title>
    <link rel="stylesheet" href="glass.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-yellow: #FFD700;
            --dark-bg: #0a1628;
            --dark-bg-gradient: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg-gradient);
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
            padding-bottom: 40px;
        }
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10, 22, 40, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }
        .settings-header-left { display: flex; align-items: center; gap: 12px; }
        .settings-icon {
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .settings-icon svg { width: 20px; height: 20px; color: var(--primary-yellow); }
        .settings-content { padding: 20px; max-width: 480px; margin: 0 auto; }
        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .form-card h3 { color: #1a1a1a; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
        .form-input {
            width: 100%; padding: 14px 16px; border: 1.5px solid #e0e0e0;
            border-radius: 14px; font-size: 15px; font-family: inherit;
            color: #1a1a1a; background: #fafafa; outline: none;
        }
        .form-input:focus { border-color: var(--primary-yellow); background: #fff; box-shadow: 0 0 0 3px rgba(255,215,0,0.15); }
        .btn-submit { width: 100%; padding: 16px; background: #1a1a1a; color: white; font-size: 16px; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-yellow { width: 100%; padding: 16px; background: var(--primary-yellow); color: #1a1a1a; font-size: 16px; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; }
        .btn-red { width: 100%; padding: 16px; background: #e74c3c; color: white; font-size: 16px; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; margin-top: 12px; }
        .success-msg {
            background: rgba(76, 175, 80, 0.15); color: #4CAF50;
            padding: 12px 16px; border-radius: 12px; font-size: 14px;
            margin-bottom: 16px; display: none;
        }
        .success-msg.show { display: block; }
        .error-msg {
            background: rgba(231, 76, 60, 0.15); color: #e74c3c;
            padding: 12px 16px; border-radius: 12px; font-size: 14px;
            margin-bottom: 16px; display: none;
        }
        .error-msg.show { display: block; }
        .divider { height: 1px; background: rgba(255,255,255,0.1); margin: 24px 0; }
        .section-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        @media (min-width: 768px) { .settings-content { max-width: 520px; padding: 40px 24px; } }
    </style>
</head>
<body>
    <header class="settings-header">
        <a href="dashboard.html" class="back-btn">← Back</a>
        <div class="settings-header-left">
            <div class="settings-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <div><h2 style="font-size:16px;font-weight:700;">Settings</h2></div>
        </div>
        <div style="width: 50px;"></div>
    </header>

    <div class="settings-content">
        <div class="success-msg" id="successMsg"></div>
        <div class="error-msg" id="errorMsg"></div>

        <div class="form-card">
            <h3>Change Password</h3>
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="currentPassword" class="form-input" placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" class="form-input" placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter new password">
            </div>
            <button class="btn-yellow" id="updatePasswordBtn" onclick="updatePassword()">Update Password</button>
        </div>

        <div class="divider"></div>
        <p class="section-label">Account</p>
        <button class="btn-red" onclick="logout()">Logout</button>
    </div>

    <script src="config.js"></script>
    <script src="glass.js"></script>
    <script>
        let currentUser = null;

        function showSuccess(msg) {
            var el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 4000);
        }

        function showError(msg) {
            var el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 4000);
        }

        async function initSettings() {
            var user = getUser();
            var session = getSession();
            
            if (!user || !session) {
                window.location.href = 'signin.html';
                return;
            }
            currentUser = user;
        }

        async function updatePassword() {
            var currentPass = document.getElementById('currentPassword').value;
            var newPass = document.getElementById('newPassword').value;
            var confirmPass = document.getElementById('confirmPassword').value;

            if (!currentPass || !newPass || !confirmPass) {
                showError('Please fill all password fields.');
                return;
            }
            if (newPass.length < 6) {
                showError('New password must be at least 6 characters.');
                return;
            }
            if (newPass !== confirmPass) {
                showError('New passwords do not match.');
                return;
            }

            var btn = document.getElementById('updatePasswordBtn');
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                var session = getSession();
                var data = await apiCall('/api/auth/update-password', 'POST', {
                    session: session,
                    currentPassword: currentPass,
                    newPassword: newPass
                });
                
                if (!data.success) throw new Error(data.error);

                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                showSuccess('Password updated successfully!');
            } catch (error) {
                showError('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }

        async function logout() {
            try {
                var session = getSession();
                if (session) {
                    await apiCall('/api/auth/signout', 'POST', { session });
                }
                clearSession();
                localStorage.clear();
                window.location.href = 'signin.html';
            } catch (error) {
                showError('Error logging out: ' + error.message);
            }
        }

        initSettings();
    </script>
</body>
</html>
