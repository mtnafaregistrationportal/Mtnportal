<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://mtn-afa-api.onrender.com; img-src 'self' data:;">
    <title>Settings - MTN AFA Portal</title>
    <link rel="stylesheet" href="glass.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-strong: rgba(255, 255, 255, 0.12);
            --glass-bg-hover: rgba(255, 255, 255, 0.16);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-border-light: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --glass-shadow: rgba(0, 0, 0, 0.15);
            --glass-shadow-strong: rgba(0, 0, 0, 0.25);
            
            --primary-yellow: #FFD700;
            --primary-yellow-glow: rgba(255, 215, 0, 0.3);
            --accent-blue: #5AC8FA;
            --accent-green: #34C759;
            --accent-red: #FF3B30;
            --accent-orange: #FF9500;
            --accent-purple: #AF52DE;
            
            --text-white: #ffffff;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.45);
            --text-dark: #1a1a1a;
            
            --bg-deep: #0a0f1a;
            --bg-gradient-start: #0a0f1a;
            --bg-gradient-mid: #0d1b2a;
            --bg-gradient-end: #0a1520;
            
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 36px;
            --radius-full: 9999px;
            
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(90, 200, 250, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(175, 82, 222, 0.02) 0%, transparent 50%);
            animation: meshMove 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 var(--primary-yellow-glow); }
            50% { box-shadow: 0 0 20px 4px var(--primary-yellow-glow); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 40%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            padding-bottom: 40px;
            position: relative;
        }
        
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10, 15, 26, 0.75);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 68px;
            transition: all var(--transition-smooth);
        }
        
        .settings-header.scrolled {
            background: rgba(10, 15, 26, 0.9);
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }
        
        .back-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            backdrop-filter: blur(20px);
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-btn:hover {
            background: var(--glass-bg-hover);
            color: var(--primary-yellow);
            transform: translateX(-2px);
        }
        
        .settings-header-left { display: flex; align-items: center; gap: 12px; }
        
        .settings-icon {
            width: 40px; 
            height: 40px;
            background: linear-gradient(135deg, var(--primary-yellow), #FFA500);
            border-radius: 12px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: none;
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.3);
            transition: all var(--transition-fast);
        }
        .settings-icon:hover {
            transform: scale(1.08) rotate(-3deg);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }
        .settings-icon svg { width: 20px; height: 20px; color: var(--text-dark); }
        
        .settings-content { 
            padding: 88px 20px 40px; 
            max-width: 480px; 
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .form-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border-radius: var(--radius-xl);
            padding: 44px 32px;
            margin-bottom: 16px;
            box-shadow: 
                0 24px 80px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.4);
            animation: scaleIn 0.5s var(--transition-spring);
            position: relative;
            overflow: hidden;
        }
        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            opacity: 0.6;
        }
        .form-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 3s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .form-card h3 { 
            color: var(--text-dark); 
            font-size: 22px; 
            font-weight: 800; 
            margin-bottom: 24px; 
            letter-spacing: -0.5px;
        }
        
        .form-group { 
            margin-bottom: 22px; 
            position: relative;
        }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-dark); 
            margin-bottom: 8px; 
            letter-spacing: 0.3px;
        }
        
        .form-input {
            width: 100%; 
            padding: 16px 18px; 
            border: 1.5px solid rgba(0,0,0,0.08);
            border-radius: var(--radius-md); 
            font-size: 15px; 
            font-family: inherit;
            color: var(--text-dark); 
            background: rgba(0,0,0,0.03); 
            outline: none;
            transition: all var(--transition-fast);
        }
        .form-input:focus { 
            border-color: var(--primary-yellow); 
            background: #fff; 
            box-shadow: 0 0 0 4px rgba(255,215,0,0.15); 
            transform: scale(1.01);
        }
        .form-input::placeholder { color: #aaa; }
        
        .btn-yellow { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, var(--primary-yellow), #FFA500); 
            color: var(--text-dark); 
            font-size: 16px; 
            font-weight: 700;
            border: none; 
            border-radius: var(--radius-md); 
            cursor: pointer; 
            transition: all var(--transition-fast);
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.3);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }
        .btn-yellow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.4);
        }
        .btn-yellow:active {
            transform: translateY(0) scale(0.98);
        }
        .btn-yellow:disabled { 
            opacity: 0.5; 
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-red { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, #FF3B30, #FF453A); 
            color: white; 
            font-size: 16px; 
            font-weight: 700;
            border: none; 
            border-radius: var(--radius-md); 
            cursor: pointer; 
            margin-top: 14px; 
            transition: all var(--transition-fast);
            box-shadow: 0 4px 16px rgba(255, 59, 48, 0.25);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }
        .btn-red:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 59, 48, 0.4);
        }
        .btn-red:active {
            transform: translateY(0) scale(0.98);
        }
        
        .success-msg {
            background: rgba(52, 199, 89, 0.12);
            color: var(--accent-green);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            font-weight: 500;
            border: 1px solid rgba(52, 199, 89, 0.2);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.3s var(--transition-smooth);
        }
        .success-msg.show { display: block; }
        
        .error-msg {
            background: rgba(255, 59, 48, 0.12);
            color: var(--accent-red);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            font-weight: 500;
            border: 1px solid rgba(255, 59, 48, 0.2);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.3s var(--transition-smooth);
        }
        .error-msg.show { display: block; }
        
        .divider { 
            height: 1px; 
            background: linear-gradient(90deg, transparent, var(--glass-border), transparent); 
            margin: 32px 0; 
        }
        
        .section-label { 
            font-size: 12px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.8px; 
            margin-bottom: 14px; 
            font-weight: 700;
        }
        
        @media (min-width: 768px) { 
            .settings-content { max-width: 520px; padding: 96px 24px 40px; }
            .settings-header { padding: 20px 32px; height: 72px; }
            .settings-content { padding-top: 96px; }
        }
        
        @media (min-width: 1024px) {
            .settings-header { padding: 24px 48px; height: 76px; }
            .settings-content { padding: 104px 24px 40px; }
        }
    </style>
</head>
<body>
    <header class="settings-header" id="settingsHeader">
        <a href="dashboard.html" class="back-btn">← Back</a>
        <div class="settings-header-left">
            <div class="settings-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <div><h2 style="font-size:16px;font-weight:700;letter-spacing:-0.3px;">Settings</h2></div>
        </div>
        <div style="width: 50px;"></div>
    </header>

    <div class="settings-content">
        <div class="success-msg" id="successMsg"></div>
        <div class="error-msg" id="errorMsg"></div>

        <div class="form-card">
            <h3>Change Password</h3>
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="currentPassword" class="form-input" placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" class="form-input" placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter new password">
            </div>
            <button class="btn-yellow" id="updatePasswordBtn" onclick="updatePassword()">Update Password</button>
        </div>

        <div class="divider"></div>
        <p class="section-label">Account</p>
        <button class="btn-red" onclick="logout()">Logout</button>
    </div>

    <script src="config.js"></script>
    <script src="glass.js"></script>
    <script>
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        let currentUser = null;

        function showSuccess(msg) {
            var el = document.getElementById('successMsg');
            el.textContent = escapeHtml(msg);
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 4000);
        }

        function showError(msg) {
            var el = document.getElementById('errorMsg');
            el.textContent = escapeHtml(msg);
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 4000);
        }

        async function initSettings() {
            var user = getUser();
            var session = getSession();
            
            if (!user || !session) {
                window.location.href = 'signin.html';
                return;
            }
            currentUser = user;
        }

        // FIXED: updatePassword now works with server endpoint
        async function updatePassword() {
            var currentPass = document.getElementById('currentPassword').value;
            var newPass = document.getElementById('newPassword').value;
            var confirmPass = document.getElementById('confirmPassword').value;

            if (!currentPass || !newPass || !confirmPass) {
                showError('Please fill all password fields.');
                return;
            }
            if (newPass.length < 6) {
                showError('New password must be at least 6 characters.');
                return;
            }
            if (newPass !== confirmPass) {
                showError('New passwords do not match.');
                return;
            }

            var btn = document.getElementById('updatePasswordBtn');
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                // FIXED: Send email and passwords, not session object
                var user = getUser();
                var userEmail = user?.email || localStorage.getItem('userEmail');
                
                if (!userEmail) {
                    throw new Error('User email not found. Please sign in again.');
                }

                // Use Supabase directly for password update (more reliable)
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: userEmail,
                    password: currentPass
                });

                if (error) {
                    throw new Error('Current password is incorrect');
                }

                const { error: updateError } = await supabaseClient.auth.updateUser({
                    password: newPass
                });

                if (updateError) throw updateError;

                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                showSuccess('Password updated successfully!');
            } catch (error) {
                showError('Error: ' + escapeHtml(error.message));
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }

        // FIXED: logout now works properly
        async function logout() {
            try {
                // Sign out from Supabase
                await supabaseClient.auth.signOut();
            } catch (e) {
                // Ignore errors
            }
            
            // Always clear local storage and redirect
            clearSession();
            window.location.href = 'signin.html';
        }

        initSettings();

        window.addEventListener('scroll', () => {
            const header = document.getElementById('settingsHeader');
            if (window.scrollY > 10) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
