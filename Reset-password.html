<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - MTN AFA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }
        .auth-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10,22,40,0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .auth-header-left { display: flex; align-items: center; gap: 12px; }
        .auth-icon {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .auth-icon svg { width: 20px; height: 20px; color: #FFD700; }
        .auth-header-text h2 { font-size: 16px; font-weight: 700; }
        .auth-content {
            padding: 24px 20px; max-width: 480px;
            margin: 0 auto;
        }
        .auth-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 32px 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .auth-card h3 { color: #1a1a1a; font-size: 24px; font-weight: 700; margin-bottom: 6px; text-align: center; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #1a1a1a; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .form-input {
            width: 100%; padding: 14px 16px; border: 1.5px solid #e0e0e0;
            border-radius: 14px; font-size: 15px; font-family: inherit;
            color: #1a1a1a; background: #fafafa; outline: none;
        }
        .form-input:focus { border-color: #FFD700; background: #fff; box-shadow: 0 0 0 3px rgba(255,215,0,0.15); }
        .password-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: 1.5px solid #ddd; border-radius: 8px;
            padding: 6px 12px; font-size: 13px; color: #666; cursor: pointer;
        }
        .btn-submit {
            width: 100%; padding: 16px; background: #1a1a1a;
            color: white; font-size: 16px; font-weight: 600;
            border: none; border-radius: 14px; cursor: pointer; margin-top: 8px;
        }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .success-msg {
            background: rgba(76, 175, 80, 0.15); color: #4CAF50;
            padding: 12px 16px; border-radius: 12px; font-size: 14px;
            margin-bottom: 16px; display: none;
        }
        .success-msg.show { display: block; }
        .error-msg {
            background: rgba(231, 76, 60, 0.15); color: #e74c3c;
            padding: 12px 16px; border-radius: 12px; font-size: 14px;
            margin-bottom: 16px; display: none;
        }
        .error-msg.show { display: block; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-overlay.hidden { display: none; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #e0e0e0;
            border-top-color: #FFD700; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (min-width: 768px) {
            .auth-content { max-width: 520px; padding: 40px 24px; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="margin-top: 16px; color: #666; font-size: 14px;">Verifying reset link...</p>
    </div>

    <div style="min-height: 100vh; display: flex; flex-direction: column;">
        <header class="auth-header">
            <div class="auth-header-left">
                <div class="auth-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <div class="auth-header-text">
                    <h2>MTN AFA Portal</h2>
                </div>
            </div>
        </header>

        <div class="auth-content" style="flex: 1;">
            <div class="auth-card">
                <h3>Set New Password</h3>
                <p class="subtitle">Create a new password for your account.</p>

                <div class="success-msg" id="successMsg"></div>
                <div class="error-msg" id="errorMsg"></div>

                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" class="form-input" placeholder="Minimum 6 characters">
                        <button type="button" class="password-toggle" onclick="togglePassword('newPassword', this)">Show</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter password">
                </div>

                <button class="btn-submit" id="resetBtn" onclick="handleResetPassword()">Reset Password</button>

                <div style="text-align: center; margin-top: 20px; font-size: 14px; color: #666;">
                    Remember your password? <a href="signin.html" style="color: #1a1a1a; font-weight: 600;">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        function getTokensFromHash() {
            const hash = window.location.hash;
            if (!hash || hash.length < 2) return null;
            const params = new URLSearchParams(hash.substring(1));
            return {
                access_token: params.get('access_token'),
                refresh_token: params.get('refresh_token'),
                type: params.get('type')
            };
        }

        async function initializeSession() {
            const tokens = getTokensFromHash();
            if (!tokens || !tokens.access_token || !tokens.refresh_token) {
                hideLoading();
                showError('Invalid or expired reset link. Please request a new password reset.');
                document.getElementById('resetBtn').disabled = true;
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.setSession({
                    access_token: tokens.access_token,
                    refresh_token: tokens.refresh_token
                });
                if (error) throw error;
                hideLoading();
            } catch (error) {
                hideLoading();
                showError('This reset link is invalid or expired. Please request a new one.');
                document.getElementById('resetBtn').disabled = true;
            }
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'Hide';
            } else {
                input.type = 'password';
                btn.textContent = 'Show';
            }
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.add('show');
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        async function handleResetPassword() {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');

            if (newPass.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }
            if (newPass !== confirmPass) {
                showError('Passwords do not match.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const { data, error } = await supabaseClient.auth.updateUser({ password: newPass });
                if (error) throw error;
                showSuccess('Password reset successful! Redirecting to sign in...');
                setTimeout(() => window.location.href = 'signin.html', 3000);
            } catch (error) {
                showError('Error: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }

        document.addEventListener('DOMContentLoaded', initializeSession);
    </script>
</body>
</html>
