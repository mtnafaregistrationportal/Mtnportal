<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - MTN AFA Portal</title>
    <link rel="stylesheet" href="glass.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           iOS 26 LIQUID GLASS DESIGN SYSTEM
           ============================================ */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-strong: rgba(255, 255, 255, 0.12);
            --glass-bg-hover: rgba(255, 255, 255, 0.16);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-border-light: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --glass-shadow: rgba(0, 0, 0, 0.15);
            --glass-shadow-strong: rgba(0, 0, 0, 0.25);
            
            --primary-yellow: #FFD700;
            --primary-yellow-glow: rgba(255, 215, 0, 0.3);
            --accent-blue: #5AC8FA;
            --accent-green: #34C759;
            --accent-red: #FF3B30;
            --accent-orange: #FF9500;
            --accent-purple: #AF52DE;
            
            --text-white: #ffffff;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.45);
            --text-dark: #1a1a1a;
            
            --bg-deep: #0a0f1a;
            --bg-gradient-start: #0a0f1a;
            --bg-gradient-mid: #0d1b2a;
            --bg-gradient-end: #0a1520;
            
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 36px;
            --radius-full: 9999px;
            
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(90, 200, 250, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(175, 82, 222, 0.02) 0%, transparent 50%);
            animation: meshMove 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 var(--primary-yellow-glow); }
            50% { box-shadow: 0 0 20px 4px var(--primary-yellow-glow); }
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        /* ============================================
           EXISTING CODE - LIQUID GLASS UPGRADED
           ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 40%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }
        
        /* Liquid Glass Fixed Header */
        .auth-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10, 15, 26, 0.75);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 68px;
            transition: all var(--transition-smooth);
        }
        
        .auth-header.scrolled {
            background: rgba(10, 15, 26, 0.9);
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }
        
        .auth-header-left { display: flex; align-items: center; gap: 12px; }
        
        /* Logo Icon - styled like uploaded image: rounded square with yellow gradient */
        .auth-icon {
            width: 44px; 
            height: 44px;
            background: linear-gradient(135deg, #F5C842, #E8A838);
            border-radius: 14px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: none;
            box-shadow: 0 4px 16px rgba(245, 200, 66, 0.3);
            transition: all var(--transition-fast);
        }
        .auth-icon:hover {
            transform: scale(1.08) rotate(-3deg);
            box-shadow: 0 6px 20px rgba(245, 200, 66, 0.4);
        }
        .auth-icon span {
            font-size: 13px;
            font-weight: 900;
            color: #1a1a1a;
            letter-spacing: -0.5px;
            font-family: 'Inter', sans-serif;
        }
        
        .auth-header-text h2 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
        
        /* Content scrolls behind fixed header */
        .auth-content {
            padding: 88px 20px 40px;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        /* Liquid Glass Auth Card */
        .auth-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border-radius: var(--radius-xl);
            padding: 44px 32px;
            margin-bottom: 16px;
            box-shadow: 
                0 24px 80px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.4);
            animation: scaleIn 0.5s var(--transition-spring);
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            opacity: 0.6;
        }
        .auth-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 3s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .auth-card h3 { 
            color: var(--text-dark); 
            font-size: 26px; 
            font-weight: 800; 
            margin-bottom: 8px; 
            text-align: center; 
            letter-spacing: -0.5px;
        }
        .subtitle { 
            color: #666; 
            font-size: 14px; 
            margin-bottom: 32px; 
            text-align: center; 
            font-weight: 400;
        }
        
        .form-group { 
            margin-bottom: 22px; 
            position: relative;
        }
        .form-group label { 
            display: block; 
            color: var(--text-dark); 
            font-size: 13px; 
            font-weight: 600; 
            margin-bottom: 8px; 
            letter-spacing: 0.3px;
        }
        
        /* Input wrapper with proper spacing for toggle button */
        .input-wrapper { 
            position: relative; 
            display: flex;
            align-items: center;
        }
        
        /* Liquid Glass Form Inputs - with right padding for toggle */
        .form-input {
            width: 100%; 
            padding: 16px 18px; 
            border: 1.5px solid rgba(0,0,0,0.08);
            border-radius: var(--radius-md); 
            font-size: 15px; 
            font-family: inherit;
            color: var(--text-dark); 
            background: rgba(0,0,0,0.03); 
            outline: none;
            transition: all var(--transition-fast);
        }
        /* Extra right padding for password input to prevent toggle overlap */
        .form-input[type="password"],
        .form-input[type="text"] {
            padding-right: 80px;
        }
        .form-input:focus { 
            border-color: var(--primary-yellow); 
            background: #fff; 
            box-shadow: 0 0 0 4px rgba(255,215,0,0.15); 
            transform: scale(1.01);
        }
        .form-input::placeholder { 
            color: #aaa; 
            opacity: 1;
        }
        
        /* Liquid Glass Password Toggle - positioned inside input */
        .password-toggle {
            position: absolute; 
            right: 8px; 
            top: 50%; 
            transform: translateY(-50%);
            background: rgba(0,0,0,0.06); 
            border: 1px solid rgba(0,0,0,0.1); 
            border-radius: var(--radius-sm);
            padding: 8px 14px; 
            font-size: 12px; 
            color: #666; 
            cursor: pointer;
            transition: all var(--transition-fast);
            font-weight: 600;
            white-space: nowrap;
            z-index: 2;
        }
        .password-toggle:hover {
            background: rgba(0,0,0,0.1);
            color: var(--text-dark);
            transform: translateY(-50%) translateY(-1px);
        }
        .password-toggle:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        /* Submit Button - BLACK as requested */
        .btn-submit {
            width: 100%; 
            padding: 18px; 
            background: #1a1a1a;
            color: white; 
            font-size: 16px; 
            font-weight: 700;
            border: none; 
            border-radius: var(--radius-md); 
            cursor: pointer; 
            margin-top: 8px;
            transition: all var(--transition-smooth);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .btn-submit:active {
            transform: translateY(0) scale(0.98);
        }
        .btn-submit:disabled { 
            opacity: 0.5; 
            cursor: not-allowed;
            transform: none;
        }
        
        /* Liquid Glass Success Message */
        .success-msg {
            background: rgba(52, 199, 89, 0.12);
            color: var(--accent-green);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            font-weight: 500;
            border: 1px solid rgba(52, 199, 89, 0.2);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.3s var(--transition-smooth);
        }
        .success-msg.show { display: block; }
        
        /* Liquid Glass Error Message */
        .error-msg {
            background: rgba(255, 59, 48, 0.12);
            color: var(--accent-red);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            font-weight: 500;
            border: 1px solid rgba(255, 59, 48, 0.2);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.3s var(--transition-smooth);
        }
        .error-msg.show { display: block; }
        
        /* Liquid Glass Loading Overlay */
        .loading-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            background: rgba(10, 15, 26, 0.92); 
            backdrop-filter: blur(20px);
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            opacity: 1;
            transition: opacity 0.3s var(--transition-smooth);
        }
        .loading-overlay.hidden { 
            opacity: 0; 
            pointer-events: none;
        }
        
        .spinner {
            width: 48px; 
            height: 48px; 
            border: 3px solid rgba(255,215,0,0.2); 
            border-top-color: var(--primary-yellow); 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        
        .loading-overlay p {
            margin-top: 20px; 
            color: var(--text-muted); 
            font-size: 14px;
            font-weight: 500;
        }
        
        /* Responsive */
        @media (min-width: 768px) {
            .auth-content { max-width: 520px; padding: 96px 24px 40px; }
            .auth-header { padding: 20px 32px; height: 72px; }
            .auth-content { padding-top: 96px; }
        }
        
        @media (min-width: 1024px) {
            .auth-header { padding: 24px 48px; height: 76px; }
            .auth-content { padding: 104px 24px 40px; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Verifying reset link...</p>
    </div>

    <div style="min-height: 100vh; display: flex; flex-direction: column;">
        <header class="auth-header" id="authHeader">
            <div class="auth-header-left">
                <div class="auth-icon">
                    <span>MTN</span>
                </div>
                <div class="auth-header-text">
                    <h2>MTN AFA Portal</h2>
                </div>
            </div>
        </header>

        <div class="auth-content" style="flex: 1;">
            <div class="auth-card">
                <h3>Set New Password</h3>
                <p class="subtitle">Create a new password for your account.</p>

                <div class="success-msg" id="successMsg"></div>
                <div class="error-msg" id="errorMsg"></div>

                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" class="form-input" placeholder="Minimum 6 characters">
                        <button type="button" class="password-toggle" onclick="togglePassword('newPassword', this)">Show</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter password">
                </div>

                <button class="btn-submit" id="resetBtn" onclick="handleResetPassword()">Reset Password</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="glass.js"></script>
    <script>
        function getTokensFromHash() {
            const hash = window.location.hash;
            if (!hash || hash.length < 2) return null;
            const params = new URLSearchParams(hash.substring(1));
            return {
                access_token: params.get('access_token'),
                refresh_token: params.get('refresh_token'),
                type: params.get('type')
            };
        }

        async function initializeSession() {
            const tokens = getTokensFromHash();
            if (!tokens || !tokens.access_token || !tokens.refresh_token) {
                hideLoading();
                showError('Invalid or expired reset link. Please request a new password reset.');
                document.getElementById('resetBtn').disabled = true;
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.setSession({
                    access_token: tokens.access_token,
                    refresh_token: tokens.refresh_token
                });
                if (error) throw error;
                hideLoading();
            } catch (error) {
                hideLoading();
                showError('This reset link is invalid or expired. Please request a new one.');
                document.getElementById('resetBtn').disabled = true;
            }
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'Hide';
            } else {
                input.type = 'password';
                btn.textContent = 'Show';
            }
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.add('show');
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        async function handleResetPassword() {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');

            if (newPass.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }
            if (newPass !== confirmPass) {
                showError('Passwords do not match.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const { data, error } = await supabaseClient.auth.updateUser({ password: newPass });
                if (error) throw error;
                showSuccess('Password reset successful! You can now close this page.');
            } catch (error) {
                showError('Error: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }

        document.addEventListener('DOMContentLoaded', initializeSession);

        // Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.getElementById('authHeader');
            if (window.scrollY > 10) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
