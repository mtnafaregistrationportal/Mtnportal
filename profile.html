<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - MTN AFA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-yellow: #FFD700;
            --dark-bg: #0a1628;
            --dark-bg-gradient: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --text-light: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.6);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg-gradient);
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
        }
        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10, 22, 40, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .profile-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .profile-icon {
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .profile-icon svg {
            width: 20px; height: 20px;
            color: var(--primary-yellow);
        }
        .profile-header-text h2 {
            font-size: 16px; font-weight: 700;
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }
        .profile-content {
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 100px;
        }
        
        /* Profile Picture Section */
        .profile-pic-section {
            text-align: center;
            margin-bottom: 24px;
        }
        .profile-pic-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-yellow);
            background: rgba(255,255,255,0.1);
        }
        .profile-pic-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 3px solid var(--primary-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .profile-pic-placeholder svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
        }
        .change-pic-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 36px;
            height: 36px;
            background: var(--primary-yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid var(--dark-bg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .change-pic-btn svg {
            width: 18px;
            height: 18px;
            color: #1a1a1a;
        }
        .change-pic-btn input[type="file"] {
            display: none;
        }
        .user-name-display {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .user-email-display {
            font-size: 14px;
            color: var(--text-muted);
        }
        .network-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        .network-mtn { background: rgba(255, 215, 0, 0.2); color: var(--primary-yellow); }
        .network-airteltigo { background: rgba(0, 150, 136, 0.2); color: #009688; }
        .network-telecel { background: rgba(156, 39, 176, 0.2); color: #9C27B0; }
        .network-unknown { background: rgba(255,255,255,0.1); color: var(--text-muted); }
        
        /* Form Cards */
        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .form-card h3 {
            color: #1a1a1a;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            color: #1a1a1a;
            background: #fafafa;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--primary-yellow);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(255,215,0,0.15);
        }
        .form-input::placeholder {
            color: #aaa;
        }
        /* Fix date input on mobile */
        input[type="date"].form-input {
            -webkit-appearance: none;
            appearance: none;
            min-height: 48px;
        }
        input[type="date"].form-input::-webkit-calendar-picker-indicator {
            filter: invert(0.3);
            cursor: pointer;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #1a1a1a;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-yellow {
            width: 100%;
            padding: 16px;
            background: var(--primary-yellow);
            color: #1a1a1a;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }
        .btn-red {
            width: 100%;
            padding: 16px;
            background: #e74c3c;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 12px;
        }
        .success-msg {
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg.show {
            display: block;
        }
        .error-msg {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 24px 0;
        }
        .section-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        /* Upload Section */
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .upload-item {
            position: relative;
        }
        .upload-item label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .upload-box {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .upload-box:hover {
            border-color: var(--primary-yellow);
            background: rgba(255, 215, 0, 0.05);
        }
        .upload-box.has-image {
            border-style: solid;
            border-color: var(--primary-yellow);
            padding: 0;
        }
        .upload-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
        }
        .upload-box input[type="file"] {
            display: none;
        }
        .upload-box svg {
            width: 28px;
            height: 28px;
            color: #999;
            margin-bottom: 6px;
        }
        .upload-box-text {
            font-size: 11px;
            color: #999;
        }
        .upload-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 10px;
            padding: 4px;
            text-align: center;
            z-index: 2;
        }
        .camera-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 28px;
            height: 28px;
            background: var(--primary-yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;
            border: 2px solid white;
        }
        .camera-btn svg {
            width: 14px;
            height: 14px;
            color: #1a1a1a;
            margin: 0;
        }
        
        /* Camera Modal */
        .camera-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .camera-modal.show { display: flex; }
        .camera-video {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            transform: scaleX(-1);
        }
        .camera-controls {
            display: flex;
            gap: 16px;
            margin-top: 20px;
        }
        .camera-capture {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--primary-yellow);
            border: 4px solid white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .camera-capture svg {
            width: 24px;
            height: 24px;
            color: #1a1a1a;
        }
        .camera-close {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
        }
        
        /* Support Card */
        .support-card {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #0066cc, #FFD700);
            background-size: 200% 200%;
            animation: gradientShift 5s ease infinite;
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            z-index: 200;
            max-width: 90%;
            width: fit-content;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .support-card svg {
            width: 24px; height: 24px;
            color: white;
            flex-shrink: 0;
        }
        .support-text {
            color: white;
            font-size: 13px;
            font-weight: 600;
        }
        .support-btn {
            background: white;
            color: #0066cc;
            font-size: 12px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 50px;
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        @media (min-width: 768px) {
            .profile-content { max-width: 520px; padding: 40px 24px 100px; }
        }
    </style>
</head>
<body>
    <header class="profile-header">
        <a href="dashboard.html" class="back-btn">&larr; Back</a>
        <div class="profile-header-left">
            <div class="profile-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <div class="profile-header-text">
                <h2>My Profile</h2>
            </div>
        </div>
        <div style="width: 50px;"></div>
    </header>

    <div class="profile-content">
        <!-- Profile Picture Section -->
        <div class="profile-pic-section">
            <div class="profile-pic-container">
                <div class="profile-pic-placeholder" id="profilePicPlaceholder">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <img src="" alt="Profile" class="profile-pic" id="profilePic" style="display: none;">
                <label class="change-pic-btn" title="Change Profile Picture">
                    <input type="file" id="picInput" accept="image/*" onchange="uploadProfilePicture()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </label>
            </div>
            <div class="user-name-display" id="displayName">User</div>
            <div class="user-email-display" id="displayEmail">user@example.com</div>
            <div class="network-badge network-unknown" id="networkBadge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                <span id="networkText">Detecting network...</span>
            </div>
        </div>

        <!-- Success/Error Messages -->
        <div class="success-msg" id="successMsg">Changes saved successfully!</div>
        <div class="error-msg" id="errorMsg">Something went wrong. Please try again.</div>

        <!-- Document Uploads -->
        <div class="form-card">
            <h3>📸 Upload Documents</h3>
            <div class="upload-grid">
                <div class="upload-item">
                    <label>Profile Photo</label>
                    <div class="upload-box" id="boxProfile" onclick="document.getElementById('uploadProfile').click()">
                        <input type="file" id="uploadProfile" accept="image/*" onchange="handleUpload(this, 'profilePhoto', 'boxProfile')">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        <span class="upload-box-text">Tap to upload</span>
                    </div>
                </div>
                <div class="upload-item">
                    <label>Selfie Photo</label>
                    <div class="upload-box" id="boxSelfie">
                        <input type="file" id="uploadSelfie" accept="image/*" onchange="handleUpload(this, 'selfie', 'boxSelfie')">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <span class="upload-box-text">Camera or upload</span>
                        <div class="camera-btn" onclick="event.stopPropagation();openCamera('selfie')" title="Take Selfie">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </div>
                    </div>
                </div>
                <div class="upload-item">
                    <label>Ghana Card Front</label>
                    <div class="upload-box" id="boxFront" onclick="document.getElementById('uploadFront').click()">
                        <input type="file" id="uploadFront" accept="image/*,.pdf" onchange="handleUpload(this, 'ghanaCardFront', 'boxFront')">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/></svg>
                        <span class="upload-box-text">Tap to upload</span>
                    </div>
                </div>
                <div class="upload-item">
                    <label>Ghana Card Back</label>
                    <div class="upload-box" id="boxBack" onclick="document.getElementById('uploadBack').click()">
                        <input type="file" id="uploadBack" accept="image/*,.pdf" onchange="handleUpload(this, 'ghanaCardBack', 'boxBack')">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/></svg>
                        <span class="upload-box-text">Tap to upload</span>
                    </div>
                </div>
            </div>
            <button class="btn-yellow" id="saveUploadsBtn" onclick="saveAllUploads()">Save All Uploads</button>
        </div>

        <!-- Change Name -->
        <div class="form-card">
            <h3>Change Name</h3>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="nameInput" class="form-input" placeholder="Enter your full name">
            </div>
            <button class="btn-submit" id="updateNameBtn" onclick="updateName()">Update Name</button>
        </div>

        <!-- Change Password -->
        <div class="form-card">
            <h3>Change Password</h3>
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="currentPassword" class="form-input" placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" class="form-input" placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter new password">
            </div>
            <button class="btn-yellow" id="updatePasswordBtn" onclick="updatePassword()">Update Password</button>
        </div>

        <!-- Logout -->
        <div class="divider"></div>
        <p class="section-label">Account</p>
        <button class="btn-red" onclick="logout()">Logout</button>
    </div>

    <!-- Camera Modal -->
    <div class="camera-modal" id="cameraModal">
        <video class="camera-video" id="cameraVideo" autoplay playsinline></video>
        <canvas id="cameraCanvas" style="display:none;"></canvas>
        <div class="camera-controls">
            <button class="camera-close" onclick="closeCamera()">Cancel</button>
            <button class="camera-capture" onclick="captureSelfie()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
        </div>
    </div>

    <!-- Support Card -->
    <div class="support-card" id="supportCard">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
        <span class="support-text">Need help? Contact support</span>
        <a href="https://wa.me/233557810669" target="_blank" class="support-btn">WhatsApp</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile, updatePassword as firebaseUpdatePassword, reauthenticateWithCredential, EmailAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcIww7vLwcx3dB0-5-OPg1sw1lcP-u4ZM",
            authDomain: "mtn-portal-671f6.firebaseapp.com",
            projectId: "mtn-portal-671f6",
            storageBucket: "mtn-portal-671f6.firebasestorage.app",
            messagingSenderId: "244083466572",
            appId: "1:244083466572:web:560219b082dddd6de56fe9",
            measurementId: "G-156B36671Y"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;
        let currentStream = null;
        let pendingUploads = {};

        // Network detection
        function detectNetwork(phone) {
            const mtn = ['024','025','053','054','055','059'];
            const airteltigo = ['026','027','056','057'];
            const telecel = ['020','050'];
            
            const prefix = phone?.substring(0, 3);
            if (mtn.includes(prefix)) return { name: 'MTN', class: 'network-mtn' };
            if (airteltigo.includes(prefix)) return { name: 'AirtelTigo', class: 'network-airteltigo' };
            if (telecel.includes(prefix)) return { name: 'Telecel', class: 'network-telecel' };
            return { name: 'Unknown', class: 'network-unknown' };
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'signin.html';
                return;
            }
            currentUser = user;

            // Load user data from Firestore
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                const name = data.name || user.displayName || 'User';
                const email = data.email || user.email || 'user@example.com';
                
                document.getElementById('displayName').textContent = name;
                document.getElementById('displayEmail').textContent = email;
                document.getElementById('nameInput').value = name;

                // Network detection
                const phone = data.phoneNumber || '';
                const network = detectNetwork(phone);
                const badge = document.getElementById('networkBadge');
                badge.className = 'network-badge ' + network.class;
                document.getElementById('networkText').textContent = network.name + (phone ? ' • ' + phone : '');

                // Load profile picture
                if (data.profilePicture) {
                    document.getElementById('profilePic').src = data.profilePicture;
                    document.getElementById('profilePic').style.display = 'block';
                    document.getElementById('profilePicPlaceholder').style.display = 'none';
                    localStorage.setItem('profilePicture', data.profilePicture);
                } else if (user.photoURL) {
                    document.getElementById('profilePic').src = user.photoURL;
                    document.getElementById('profilePic').style.display = 'block';
                    document.getElementById('profilePicPlaceholder').style.display = 'none';
                }

                // Load existing uploads
                if (data.uploads) {
                    const uploads = data.uploads;
                    if (uploads.profilePhoto) showPreview('boxProfile', uploads.profilePhoto);
                    if (uploads.selfie) showPreview('boxSelfie', uploads.selfie);
                    if (uploads.ghanaCardFront) showPreview('boxFront', uploads.ghanaCardFront);
                    if (uploads.ghanaCardBack) showPreview('boxBack', uploads.ghanaCardBack);
                }
            }
        });

        function showPreview(boxId, url) {
            const box = document.getElementById(boxId);
            box.classList.add('has-image');
            box.innerHTML = `<img src="${url}" alt="Uploaded"><div class="upload-overlay">Tap to change</div>`;
            // Re-add hidden input
            const inputMap = {
                'boxProfile': 'uploadProfile',
                'boxSelfie': 'uploadSelfie',
                'boxFront': 'uploadFront',
                'boxBack': 'uploadBack'
            };
            const inputId = inputMap[boxId];
            if (inputId) {
                const input = document.getElementById(inputId);
                box.onclick = () => input.click();
            }
        }

        async function uploadProfilePicture() {
            const file = document.getElementById('picInput').files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                showError('Please select an image file.');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showError('Image must be less than 5MB.');
                return;
            }

            try {
                const storageRef = ref(storage, `profilePictures/${currentUser.uid}_${Date.now()}`);
                await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(storageRef);

                await updateDoc(doc(db, 'users', currentUser.uid), {
                    profilePicture: downloadURL
                });

                await updateProfile(currentUser, { photoURL: downloadURL });

                document.getElementById('profilePic').src = downloadURL;
                document.getElementById('profilePic').style.display = 'block';
                document.getElementById('profilePicPlaceholder').style.display = 'none';
                localStorage.setItem('profilePicture', downloadURL);

                showSuccess('Profile picture updated!');
            } catch (error) {
                showError('Error uploading picture: ' + error.message);
            }
        }
        window.uploadProfilePicture = uploadProfilePicture;

        // Handle file uploads (store in pendingUploads)
        window.handleUpload = async function(input, type, boxId) {
            const file = input.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/') && !file.type.includes('pdf')) {
                showError('Please select an image or PDF file.');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showError('File must be less than 5MB.');
                return;
            }

            // Show preview immediately
            const reader = new FileReader();
            reader.onload = (e) => {
                const box = document.getElementById(boxId);
                box.classList.add('has-image');
                if (file.type.startsWith('image/')) {
                    box.innerHTML = `<img src="${e.target.result}" alt="Preview"><div class="upload-overlay">Tap to change</div>`;
                } else {
                    box.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;"><svg width="32" height="32" fill="#666" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z"/></svg></div><div class="upload-overlay">PDF Selected</div>`;
                }
                // Re-add click handler
                const inputMap = {
                    'boxProfile': 'uploadProfile',
                    'boxSelfie': 'uploadSelfie',
                    'boxFront': 'uploadFront',
                    'boxBack': 'uploadBack'
                };
                const inputId = inputMap[boxId];
                if (inputId) {
                    const inp = document.getElementById(inputId);
                    box.onclick = () => inp.click();
                }
            };
            reader.readAsDataURL(file);

            // Store file for later upload
            pendingUploads[type] = file;
            showSuccess(`${type.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())} selected. Click "Save All Uploads" to upload.`);
        };

        // Save all uploads to Firebase
        window.saveAllUploads = async function() {
            if (Object.keys(pendingUploads).length === 0) {
                showError('No new files to upload.');
                return;
            }

            const btn = document.getElementById('saveUploadsBtn');
            btn.disabled = true;
            btn.textContent = 'Uploading...';

            try {
                const uploadData = {};
                const uploadPromises = [];

                for (const [type, file] of Object.entries(pendingUploads)) {
                    const storageRef = ref(storage, `uploads/${currentUser.uid}/${type}_${Date.now()}`);
                    const promise = uploadBytes(storageRef, file).then(async (snapshot) => {
                        const url = await getDownloadURL(snapshot.ref);
                        uploadData[type] = url;
                    });
                    uploadPromises.push(promise);
                }

                await Promise.all(uploadPromises);

                // Save to Firestore
                await updateDoc(doc(db, 'users', currentUser.uid), {
                    uploads: uploadData
                });

                pendingUploads = {};
                showSuccess('All uploads saved successfully!');
            } catch (error) {
                showError('Error saving uploads: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save All Uploads';
            }
        };

        // Camera functions
        window.openCamera = async function(type) {
            const modal = document.getElementById('cameraModal');
            const video = document.getElementById('cameraVideo');
            
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, 
                    audio: false 
                });
                video.srcObject = currentStream;
                modal.classList.add('show');
                modal.dataset.type = type;
            } catch (err) {
                showError('Camera access denied. Please use file upload instead.');
                // Fallback: trigger file input
                document.getElementById('uploadSelfie').click();
            }
        };

        window.closeCamera = function() {
            const modal = document.getElementById('cameraModal');
            const video = document.getElementById('cameraVideo');
            modal.classList.remove('show');
            
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            video.srcObject = null;
        };

        window.captureSelfie = function() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.getElementById('cameraCanvas');
            const modal = document.getElementById('cameraModal');
            const type = modal.dataset.type || 'selfie';

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            canvas.toBlob(async (blob) => {
                const file = new File([blob], `selfie_${Date.now()}.jpg`, { type: 'image/jpeg' });
                pendingUploads[type] = file;

                // Show preview
                const reader = new FileReader();
                reader.onload = (e) => {
                    const box = document.getElementById('boxSelfie');
                    box.classList.add('has-image');
                    box.innerHTML = `<img src="${e.target.result}" alt="Selfie"><div class="upload-overlay">Selfie captured</div>`;
                    const inp = document.getElementById('uploadSelfie');
                    box.onclick = () => inp.click();
                };
                reader.readAsDataURL(file);

                closeCamera();
                showSuccess('Selfie captured! Click "Save All Uploads" to save.');
            }, 'image/jpeg', 0.9);
        };

        async function updateName() {
            const newName = document.getElementById('nameInput').value.trim();
            if (!newName) {
                showError('Please enter a name.');
                return;
            }

            const btn = document.getElementById('updateNameBtn');
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                await updateProfile(currentUser, { displayName: newName });
                await updateDoc(doc(db, 'users', currentUser.uid), { name: newName });
                
                document.getElementById('displayName').textContent = newName;
                localStorage.setItem('userName', newName);
                showSuccess('Name updated successfully!');
            } catch (error) {
                showError('Error updating name: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Name';
            }
        }
        window.updateName = updateName;

        async function updatePassword() {
            const currentPass = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (!currentPass || !newPass || !confirmPass) {
                showError('Please fill all password fields.');
                return;
            }
            if (newPass.length < 6) {
                showError('New password must be at least 6 characters.');
                return;
            }
            if (newPass !== confirmPass) {
                showError('New passwords do not match.');
                return;
            }

            const btn = document.getElementById('updatePasswordBtn');
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const credential = EmailAuthProvider.credential(currentUser.email, currentPass);
                await reauthenticateWithCredential(currentUser, credential);
                await firebaseUpdatePassword(currentUser, newPass);
                
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                showSuccess('Password updated successfully!');
            } catch (error) {
                if (error.code === 'auth/wrong-password') {
                    showError('Current password is incorrect.');
                } else {
                    showError('Error: ' + error.message);
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }
        window.updatePassword = updatePassword;

        async function logout() {
            try {
                await signOut(auth);
                localStorage.clear();
                window.location.href = 'signin.html';
            } catch (error) {
                showError('Error logging out: ' + error.message);
            }
        }
        window.logout = logout;
    </script>
</body>
</html>
