<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - MTN AFA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-yellow: #FFD700;
            --dark-bg: #0a1628;
            --dark-bg-gradient: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --text-light: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.6);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg-gradient);
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
            padding-bottom: 40px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10, 22, 40, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .profile-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .profile-icon {
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .profile-icon svg {
            width: 20px; height: 20px;
            color: var(--primary-yellow);
        }
        .profile-header-text h2 {
            font-size: 16px; font-weight: 700;
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }
        .profile-content {
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
        }
        
        /* Profile Picture Section */
        .profile-pic-section {
            text-align: center;
            margin-bottom: 24px;
        }
        .profile-pic-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-yellow);
            background: rgba(255,255,255,0.1);
            display: none;
        }
        .profile-pic.show {
            display: block;
        }
        .profile-pic-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 3px solid var(--primary-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .profile-pic-placeholder svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
        }
        .profile-pic-placeholder.hidden {
            display: none;
        }
        .change-pic-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 36px;
            height: 36px;
            background: var(--primary-yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid var(--dark-bg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .change-pic-btn svg {
            width: 18px;
            height: 18px;
            color: #1a1a1a;
        }
        .change-pic-btn input[type="file"] {
            display: none;
        }
        .user-name-display {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .user-email-display {
            font-size: 14px;
            color: var(--text-muted);
        }
        .network-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        .network-mtn { background: rgba(255, 215, 0, 0.2); color: var(--primary-yellow); }
        .network-airteltigo { background: rgba(0, 150, 136, 0.2); color: #009688; }
        .network-telecel { background: rgba(156, 39, 176, 0.2); color: #9C27B0; }
        .network-unknown { background: rgba(255,255,255,0.1); color: var(--text-muted); }
        
        /* Form Cards */
        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .form-card h3 {
            color: #1a1a1a;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            color: #1a1a1a;
            background: #fafafa;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--primary-yellow);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(255,215,0,0.15);
        }
        .form-input::placeholder {
            color: #aaa;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #1a1a1a;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-yellow {
            width: 100%;
            padding: 16px;
            background: var(--primary-yellow);
            color: #1a1a1a;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }
        .btn-red {
            width: 100%;
            padding: 16px;
            background: #e74c3c;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 12px;
        }
        .success-msg {
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg.show {
            display: block;
        }
        .error-msg {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 24px 0;
        }
        .section-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        @media (min-width: 768px) {
            .profile-content { max-width: 520px; padding: 40px 24px; }
        }
    </style>
</head>
<body>
    <header class="profile-header">
        <a href="dashboard.html" class="back-btn">&larr; Back</a>
        <div class="profile-header-left">
            <div class="profile-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <div class="profile-header-text">
                <h2>My Profile</h2>
            </div>
        </div>
        <div style="width: 50px;"></div>
    </header>

    <div class="profile-content">
        <!-- Profile Picture Section -->
        <div class="profile-pic-section">
            <div class="profile-pic-container">
                <div class="profile-pic-placeholder" id="profilePicPlaceholder">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <img src="" alt="Profile" class="profile-pic" id="profilePic">
                <label class="change-pic-btn" for="picInput" title="Change Profile Picture">
                    <input type="file" id="picInput" accept="image/*" onchange="handleProfilePic(this)">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </label>
            </div>
            <div class="user-name-display" id="displayName">User</div>
            <div class="user-email-display" id="displayEmail">user@example.com</div>
            <div class="network-badge network-unknown" id="networkBadge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                <span id="networkText">Detecting network...</span>
            </div>
        </div>

        <!-- Success/Error Messages -->
        <div class="success-msg" id="successMsg">Changes saved successfully!</div>
        <div class="error-msg" id="errorMsg">Something went wrong. Please try again.</div>

        <!-- Change Name -->
        <div class="form-card">
            <h3>Change Name</h3>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="nameInput" class="form-input" placeholder="Enter your full name">
            </div>
            <button class="btn-submit" id="updateNameBtn" onclick="updateName()">Update Name</button>
        </div>

        <!-- Change Password -->
        <div class="form-card">
            <h3>Change Password</h3>
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="currentPassword" class="form-input" placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" class="form-input" placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter new password">
            </div>
            <button class="btn-yellow" id="updatePasswordBtn" onclick="updatePassword()">Update Password</button>
        </div>

        <!-- Logout -->
        <div class="divider"></div>
        <p class="section-label">Account</p>
        <button class="btn-red" onclick="logout()">Logout</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://iqzjpdynmnucxswbrkho.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxempwZHlubW51Y3hzd2Jya2hvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMDY1OTksImV4cCI6MjA5NTc4MjU5OX0.Wro7xlYFR2zNIVitHSWI6itG5jPFYLMa2kpctGkY3QQ';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        function detectNetwork(phone) {
            var mtn = ['024','025','053','054','055','059'];
            var airteltigo = ['026','027','056','057'];
            var telecel = ['020','050'];
            
            var prefix = phone ? phone.substring(0, 3) : '';
            if (mtn.indexOf(prefix) !== -1) return { name: 'MTN', class: 'network-mtn' };
            if (airteltigo.indexOf(prefix) !== -1) return { name: 'AirtelTigo', class: 'network-airteltigo' };
            if (telecel.indexOf(prefix) !== -1) return { name: 'Telecel', class: 'network-telecel' };
            return { name: 'Unknown', class: 'network-unknown' };
        }

        function showSuccess(msg) {
            var el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 4000);
        }

        function showError(msg) {
            var el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 4000);
        }

        function displayProfilePic(url) {
            if (url) {
                document.getElementById('profilePic').src = url;
                document.getElementById('profilePic').classList.add('show');
                document.getElementById('profilePicPlaceholder').classList.add('hidden');
            }
        }

        async function initProfile() {
            var sessionResult = await supabase.auth.getSession();
            var session = sessionResult.data.session;
            
            if (!session) {
                window.location.href = 'signin.html';
                return;
            }

            currentUser = session.user;

            var userResult = await supabase
                .from('users')
                .select('*')
                .eq('id', currentUser.id)
                .single();

            if (userResult.error) {
                showError('Failed to load profile data.');
                return;
            }

            var userData = userResult.data;
            if (userData) {
                var name = userData.name || currentUser.user_metadata?.name || 'User';
                var email = userData.email || currentUser.email || 'user@example.com';
                
                document.getElementById('displayName').textContent = name;
                document.getElementById('displayEmail').textContent = email;
                document.getElementById('nameInput').value = name;

                var phone = userData.phone_number || '';
                var network = detectNetwork(phone);
                var badge = document.getElementById('networkBadge');
                badge.className = 'network-badge ' + network.class;
                document.getElementById('networkText').textContent = network.name + (phone ? ' • ' + phone : '');

                // Load profile picture from Supabase or localStorage
                var picUrl = userData.profile_picture || localStorage.getItem('profilePicture');
                if (picUrl) {
                    displayProfilePic(picUrl);
                    localStorage.setItem('profilePicture', picUrl);
                }
            }
        }

        function handleProfilePic(input) {
            var file = input.files[0];
            if (!file) return;

            // Show preview immediately
            var reader = new FileReader();
            reader.onload = function(e) {
                displayProfilePic(e.target.result);
            };
            reader.readAsDataURL(file);

            // Upload to Supabase
            uploadProfilePicture(file);
        }
        window.handleProfilePic = handleProfilePic;

        async function uploadProfilePicture(file) {
            if (!file.type.startsWith('image/')) {
                showError('Please select an image file.');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showError('Image must be less than 5MB.');
                return;
            }

            try {
                var fileExt = file.name.split('.').pop();
                var fileName = 'avatars/' + currentUser.id + '_' + Date.now() + '.' + fileExt;

                var uploadResult = await supabase.storage
                    .from('avatars')
                    .upload(fileName, file, { upsert: true });

                if (uploadResult.error) throw uploadResult.error;

                var urlResult = supabase.storage
                    .from('avatars')
                    .getPublicUrl(fileName);

                var publicUrl = urlResult.data.publicUrl;

                // Update users table
                var updateResult = await supabase
                    .from('users')
                    .update({ profile_picture: publicUrl })
                    .eq('id', currentUser.id);

                if (updateResult.error) throw updateResult.error;

                // Update auth metadata
                await supabase.auth.updateUser({
                    data: { avatar_url: publicUrl }
                });

                displayProfilePic(publicUrl);
                localStorage.setItem('profilePicture', publicUrl);
                showSuccess('Profile picture updated!');
            } catch (error) {
                showError('Error uploading picture: ' + error.message);
            }
        }

        async function updateName() {
            var newName = document.getElementById('nameInput').value.trim();
            if (!newName) {
                showError('Please enter a name.');
                return;
            }

            var btn = document.getElementById('updateNameBtn');
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                await supabase.auth.updateUser({
                    data: { name: newName }
                });

                var result = await supabase
                    .from('users')
                    .update({ name: newName })
                    .eq('id', currentUser.id);

                if (result.error) throw result.error;

                document.getElementById('displayName').textContent = newName;
                localStorage.setItem('userName', newName);
                showSuccess('Name updated successfully!');
            } catch (error) {
                showError('Error updating name: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Name';
            }
        }
        window.updateName = updateName;

        async function updatePassword() {
            var currentPass = document.getElementById('currentPassword').value;
            var newPass = document.getElementById('newPassword').value;
            var confirmPass = document.getElementById('confirmPassword').value;

            if (!currentPass || !newPass || !confirmPass) {
                showError('Please fill all password fields.');
                return;
            }
            if (newPass.length < 6) {
                showError('New password must be at least 6 characters.');
                return;
            }
            if (newPass !== confirmPass) {
                showError('New passwords do not match.');
                return;
            }

            var btn = document.getElementById('updatePasswordBtn');
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                var reauthResult = await supabase.auth.signInWithPassword({
                    email: currentUser.email,
                    password: currentPass
                });

                if (reauthResult.error) {
                    throw new Error('Current password is incorrect.');
                }

                var updateResult = await supabase.auth.updateUser({
                    password: newPass
                });

                if (updateResult.error) throw updateResult.error;

                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                showSuccess('Password updated successfully!');
            } catch (error) {
                showError('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }
        window.updatePassword = updatePassword;

        async function logout() {
            try {
                await supabase.auth.signOut();
                localStorage.clear();
                window.location.href = 'signin.html';
            } catch (error) {
                showError('Error logging out: ' + error.message);
            }
        }
        window.logout = logout;

        // Initialize
        initProfile();
    </script>
</body>
</html>
