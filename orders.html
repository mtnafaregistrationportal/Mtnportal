<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - MTN AFA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-yellow: #FFD700;
            --dark-bg: #0a1628;
            --dark-bg-gradient: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg-gradient);
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
            padding-bottom: 100px;
        }
        .orders-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10, 22, 40, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .orders-header-left { display: flex; align-items: center; gap: 12px; }
        .orders-icon {
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .orders-icon svg { width: 20px; height: 20px; color: var(--primary-yellow); }
        .orders-content { padding: 20px; max-width: 480px; margin: 0 auto; }
        .section-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
        }
        .stat-value { font-size: 22px; font-weight: 800; color: var(--primary-yellow); }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
        .order-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .order-id { font-size: 12px; color: var(--text-muted); font-family: monospace; }
        .order-status {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
        .status-processing { background: rgba(33, 150, 243, 0.2); color: #2196F3; }
        .status-approved { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .status-rejected { background: rgba(244, 67, 54, 0.2); color: #F44336; }
        .status-paid { background: rgba(255, 215, 0, 0.2); color: var(--primary-yellow); }
        .order-details { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
        .detail-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
        .detail-label { color: var(--text-muted); }
        .detail-value { font-weight: 600; }
        .admin-note {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            margin-top: 12px;
            font-size: 12px;
            color: #FFC107;
        }
        .admin-note.rejected { background: rgba(244, 67, 54, 0.1); border-color: rgba(244, 67, 54, 0.3); color: #F44336; }
        .admin-note.approved { background: rgba(76, 175, 80, 0.1); border-color: rgba(76, 175, 80, 0.3); color: #4CAF50; }
        .contact-support-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #22c55e, #FFD700, #1a1a1a, #22c55e);
            background-size: 300% 100%;
            animation: colorShift 4.8s ease infinite;
            border-radius: 50px;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 200;
            text-decoration: none;
        }
        @keyframes colorShift {
            0% { background-position: 0% 50%; }
            33% { background-position: 50% 50%; }
            66% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .contact-support-btn svg { width: 22px; height: 22px; color: white; }
        .contact-support-text { color: white; font-size: 14px; font-weight: 600; }
        @media (min-width: 768px) { .orders-content { max-width: 720px; padding: 40px 24px; } }
    </style>
</head>
<body>
    <header class="orders-header">
        <a href="dashboard.html" class="back-btn">← Back</a>
        <div class="orders-header-left">
            <div class="orders-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                </svg>
            </div>
            <div class="orders-header-text"><h2 style="font-size:16px;font-weight:700;">My Orders</h2></div>
        </div>
        <div style="width: 60px;"></div>
    </header>

    <div class="orders-content">
        <h1 class="section-title">Orders</h1>
        
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingOrders">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="approvedOrders">0</div>
                <div class="stat-label">Approved</div>
            </div>
        </div>

        <div id="ordersList">
            <div class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                <p>No orders yet. Submit your first AFA registration.</p>
            </div>
        </div>
    </div>

    <!-- UPDATED: WhatsApp number changed to 0503107100 -->
    <a href="https://wa.me/233503107100" target="_blank" class="contact-support-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12c0 1.82.49 3.53 1.35 5.02L2 22l5.11-1.34A9.93 9.93 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.53 0-2.97-.43-4.2-1.17l-.3-.18-3.03.79.81-2.95-.2-.31A8.02 8.02 0 014 12c0-4.42 3.58-8 8-8s8 3.58 8 8-3.58 8-8 8zm4.54-6.15c-.25-.12-1.47-.73-1.7-.81-.23-.08-.4-.12-.56.12-.17.25-.64.81-.78.97-.14.17-.29.19-.54.06-.25-.12-1.05-.39-2-1.23-.74-.66-1.23-1.47-1.38-1.72-.14-.25-.02-.38.11-.51.11-.11.25-.29.37-.43.12-.14.17-.25.25-.42.08-.17.04-.31-.02-.43-.06-.12-.56-1.35-.77-1.84-.2-.48-.4-.42-.56-.43-.14 0-.31-.02-.48-.02-.17 0-.43.06-.66.31-.22.25-.85.83-.85 2.03 0 1.2.87 2.36.99 2.52.12.17 1.71 2.61 4.15 3.66.58.25 1.03.4 1.38.51.58.18 1.1.16 1.52.1.46-.07 1.47-.6 1.68-1.18.2-.58.2-1.07.14-1.18-.06-.11-.22-.17-.47-.29z"/>
        </svg>
        <span class="contact-support-text">Contact Support</span>
    </a>

    <script src="config.js"></script>
    <script>
        let totalCount = 0;
        let pendingCount = 0;
        let approvedCount = 0;

        async function initOrders() {
            var user = getUser();
            var session = getSession();
            
            if (!user || !session) {
                window.location.href = 'signin.html';
                return;
            }

            try {
                var data = await apiCall('/api/user/orders', 'POST', { userId: user.id });
                if (!data.success) throw new Error(data.error);
                
                renderOrders(data.orders);
            } catch (error) {
                console.error('Error fetching orders:', error);
            }
        }

        function renderOrders(orders) {
            var container = document.getElementById('ordersList');
            totalCount = orders.length;
            pendingCount = 0;
            approvedCount = 0;

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                        <p>No orders yet. Submit your first AFA registration.</p>
                    </div>`;
                updateStats();
                return;
            }

            var html = '';
            for (var i = 0; i < orders.length; i++) {
                var order = orders[i];
                var status = order.status || 'pending';

                // Count: pending/processing/paid = pending, approved = approved
                if (status === 'pending' || status === 'processing' || status === 'paid') pendingCount++;
                if (status === 'approved') approvedCount++;

                var statusClass = 'status-' + status;
                var statusText = status === 'approved' ? 'Completed ✅' :
                    status === 'rejected' ? 'Rejected ❌' :
                    status === 'processing' ? 'Processing ⏳' :
                    status === 'paid' ? 'Paid - Pending Approval' : 'Pending Approval';

                var date = order.created_at ? new Date(order.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : 'Just now';

                var adminNote = '';
                if (status === 'rejected' && order.admin_note) {
                    adminNote = '<div class="admin-note rejected">Admin: ' + order.admin_note + '</div>';
                } else if (status === 'approved') {
                    adminNote = '<div class="admin-note approved">✅ Order completed! Your registration has been approved.</div>';
                } else if (status === 'processing') {
                    adminNote = '<div class="admin-note">⏳ Your registration is being processed...</div>';
                } else if (status === 'paid' || status === 'pending') {
                    adminNote = '<div class="admin-note">💳 Payment received. Awaiting admin approval...</div>';
                }

                var orderId = order.id ? order.id.toString().substr(-8).toUpperCase() : 'N/A';

                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">#${orderId}</span>
                            <span class="order-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="order-details">
                            <div class="detail-row">
                                <span class="detail-label">Applicant</span>
                                <span class="detail-value">${order.applicant_name || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Phone</span>
                                <span class="detail-value">${order.applicant_phone || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Amount</span>
                                <span class="detail-value">GH₵ ${(order.amount || 13).toFixed(2)}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Payment Ref</span>
                                <span class="detail-value">${order.payment_reference || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Date</span>
                                <span class="detail-value">${date}</span>
                            </div>
                        </div>
                        ${adminNote}
                    </div>
                `;
            }

            container.innerHTML = html;
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalOrders').textContent = totalCount;
            document.getElementById('pendingOrders').textContent = pendingCount;
            document.getElementById('approvedOrders').textContent = approvedCount;
        }

        initOrders();
    </script>
</body>
</html>
