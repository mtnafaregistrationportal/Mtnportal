<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - MTN AFA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-yellow: #FFD700;
            --dark-bg: #0a1628;
            --dark-bg-gradient: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg-gradient);
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
            padding-bottom: 100px;
        }
        .orders-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10, 22, 40, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .orders-header-left { display: flex; align-items: center; gap: 12px; }
        .orders-icon {
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .orders-icon svg { width: 20px; height: 20px; color: var(--primary-yellow); }
        .orders-content { padding: 20px; max-width: 480px; margin: 0 auto; }
        .section-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
        }
        .stat-value { font-size: 22px; font-weight: 800; color: var(--primary-yellow); }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
        .order-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .order-id { font-size: 12px; color: var(--text-muted); font-family: monospace; }
        .order-status {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
        .status-processing { background: rgba(33, 150, 243, 0.2); color: #2196F3; }
        .status-approved { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .status-rejected { background: rgba(244, 67, 54, 0.2); color: #F44336; }
        .status-paid { background: rgba(255, 215, 0, 0.2); color: var(--primary-yellow); }
        .status-failed { background: rgba(244, 67, 54, 0.2); color: #F44336; }
        .order-details { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
        .detail-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
        .detail-label { color: var(--text-muted); }
        .detail-value { font-weight: 600; }
        .admin-note {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            margin-top: 12px;
            font-size: 12px;
            color: #FFC107;
        }
        .admin-note.rejected { background: rgba(244, 67, 54, 0.1); border-color: rgba(244, 67, 54, 0.3); color: #F44336; }
        .admin-note.approved { background: rgba(76, 175, 80, 0.1); border-color: rgba(76, 175, 80, 0.3); color: #4CAF50; }
        .admin-note.failed { background: rgba(244, 67, 54, 0.1); border-color: rgba(244, 67, 54, 0.3); color: #F44336; }
        .admin-note.paid { background: rgba(255, 215, 0, 0.1); border-color: rgba(255, 215, 0, 0.3); color: var(--primary-yellow); }
        .contact-support-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #22c55e, #FFD700, #1a1a1a, #22c55e);
            background-size: 300% 100%;
            animation: colorShift 4.8s ease infinite;
            border-radius: 50px;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 200;
            text-decoration: none;
        }
        @keyframes colorShift {
            0% { background-position: 0% 50%; }
            33% { background-position: 50% 50%; }
            66% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .contact-support-btn svg { width: 22px; height: 22px; color: white; }
        .contact-support-text { color: white; font-size: 14px; font-weight: 600; }
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            flex-direction: column;
            gap: 12px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .verify-loading {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .verify-loading .dot {
            width: 6px;
            height: 6px;
            background: #FFD700;
            border-radius: 50%;
            animation: pulse 1.4s infinite;
        }
        .verify-loading .dot:nth-child(2) { animation-delay: 0.2s; }
        .verify-loading .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        @media (min-width: 768px) { .orders-content { max-width: 720px; padding: 40px 24px; } }
    </style>
</head>
<body>
    <header class="orders-header">
        <a href="dashboard.html" class="back-btn">← Back</a>
        <div class="orders-header-left">
            <div class="orders-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                </svg>
            </div>
            <div class="orders-header-text"><h2 style="font-size:16px;font-weight:700;">My Orders</h2></div>
        </div>
        <div style="width: 60px;"></div>
    </header>

    <div class="orders-content">
        <h1 class="section-title">Orders</h1>
        
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingOrders">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="approvedOrders">0</div>
                <div class="stat-label">Approved</div>
            </div>
        </div>

        <div id="ordersList">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p style="color: var(--text-muted); font-size: 14px;">Loading your orders...</p>
            </div>
        </div>
    </div>

    <a href="https://wa.me/233503107100" target="_blank" class="contact-support-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12c0 1.82.49 3.53 1.35 5.02L2 22l5.11-1.34A9.93 9.93 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.53 0-2.97-.43-4.2-1.17l-.3-.18-3.03.79.81-2.95-.2-.31A8.02 8.02 0 014 12c0-4.42 3.58-8 8-8s8 3.58 8 8-3.58 8-8 8zm4.54-6.15c-.25-.12-1.47-.73-1.7-.81-.23-.08-.4-.12-.56.12-.17.25-.64.81-.78.97-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        <span class="contact-support-text">Contact Support</span>
    </a>

    <script src="config.js"></script>
    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_BASE = 'https://mtn-afa-api.onrender.com';

        // ============================================
        // UNIFIED AUTH HELPERS - Works with BOTH config.js and standalone
        // ============================================
        function getUserUnified() {
            // Try config.js getUser() first
            if (typeof getUser === 'function') {
                const user = getUser();
                if (user && user.id) return user;
            }
            
            // Fallback: try config.js getCurrentUser() if it exists
            if (typeof getCurrentUser === 'function') {
                const user = getCurrentUser();
                if (user && user.id) return user;
            }
            
            // Fallback: try afa_user key (orders.html standalone)
            const afaUser = localStorage.getItem('afa_user');
            if (afaUser) {
                try { return JSON.parse(afaUser); } catch (e) {}
            }
            
            // Fallback: try dashboard keys
            return {
                id: localStorage.getItem('userId'),
                name: localStorage.getItem('userName'),
                email: localStorage.getItem('userEmail'),
                phone: localStorage.getItem('userPhone'),
                profilePicture: localStorage.getItem('profilePicture') || localStorage.getItem('userProfilePicture')
            };
        }

        function getSessionUnified() {
            // Try config.js getSession() first
            if (typeof getSession === 'function') {
                const session = getSession();
                if (session) return session;
            }
            
            // Fallback: try afa_session key (orders.html standalone)
            const afaSession = localStorage.getItem('afa_session');
            if (afaSession) {
                try { return JSON.parse(afaSession); } catch (e) {}
            }
            
            // Fallback: try individual token keys
            return {
                access_token: localStorage.getItem('access_token') || localStorage.getItem('sb_token') || localStorage.getItem('token')
            };
        }

        function getTokenUnified() {
            const session = getSessionUnified();
            return session ? (session.access_token || session.token) : null;
        }

        function isAuthenticatedUnified() {
            const user = getUserUnified();
            const token = getTokenUnified();
            return !!(user && user.id && token);
        }

        // ============================================
        // API CALL HELPER - Uses config.js apiCall if available, otherwise built-in
        // ============================================
        async function apiCallUnified(endpoint, method, body) {
            const token = getTokenUnified();
            const headers = {
                'Content-Type': 'application/json'
            };
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }
            
            // Try config.js apiCall first (it might have extra logic)
            if (typeof apiCall === 'function') {
                try {
                    return await apiCall(endpoint, method, body);
                } catch (e) {
                    // Fall through to built-in
                }
            }
            
            const response = await fetch(API_BASE + endpoint, {
                method: method,
                headers: headers,
                body: body ? JSON.stringify(body) : null
            });
            
            return await response.json();
        }

        // ============================================
        // PAYMENT VERIFICATION
        // ============================================
        async function verifyPaymentWithBackend(reference) {
            try {
                const response = await fetch(API_BASE + '/api/payment/verify-status?reference=' + encodeURIComponent(reference));
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Payment verification error:', error);
                return { verified: false, error: true };
            }
        }

        // ============================================
        // ORDER STATUS DETERMINATION
        // ============================================
        async function getOrderDisplayStatus(order) {
            if (order.status === 'approved') {
                return {
                    badge: 'Completed',
                    badgeClass: 'status-approved',
                    noteClass: 'approved',
                    noteText: '✅ Order completed! Your registration has been approved.'
                };
            }
            
            if (order.status === 'rejected') {
                return {
                    badge: 'Rejected',
                    badgeClass: 'status-rejected',
                    noteClass: 'rejected',
                    noteText: '❌ Registration rejected. Please contact support for assistance.'
                };
            }
            
            if (order.status === 'failed') {
                return {
                    badge: 'Payment Failed',
                    badgeClass: 'status-failed',
                    noteClass: 'failed',
                    noteText: '⚠️ Transaction failed. Your registration will be processed. Please make sure your payment is confirmed so that registration will be completed.'
                };
            }
            
            if (order.status === 'pending' || order.status === 'paid') {
                if (!order.payment_reference) {
                    return {
                        badge: 'Pending',
                        badgeClass: 'status-pending',
                        noteClass: 'pending',
                        noteText: '⏳ Waiting for payment initialization...',
                        verifying: true
                    };
                }
                
                const verifyData = await verifyPaymentWithBackend(order.payment_reference);
                
                if (verifyData.verified) {
                    return {
                        badge: 'Pending Approval',
                        badgeClass: 'status-paid',
                        noteClass: 'paid',
                        noteText: '💳 Payment received. Awaiting AFA approval...'
                    };
                } else {
                    return {
                        badge: 'Payment Failed',
                        badgeClass: 'status-failed',
                        noteClass: 'failed',
                        noteText: '⚠️ Transaction failed. Your registration will be processed. Please make sure your payment is confirmed so that registration will be completed.'
                    };
                }
            }
            
            return {
                badge: 'Unknown',
                badgeClass: 'status-pending',
                noteClass: 'pending',
                noteText: '⏳ Status unknown. Please refresh the page.'
            };
        }

        // ============================================
        // STATS TRACKING
        // ============================================
        let totalCount = 0;
        let pendingCount = 0;
        let approvedCount = 0;

        // ============================================
        // MAIN INIT
        // ============================================
        async function initOrders() {
            // Check auth using unified helper
            if (!isAuthenticatedUnified()) {
                console.log('User not authenticated, redirecting to signin');
                window.location.href = 'signin.html';
                return;
            }

            const user = getUserUnified();
            
            try {
                const data = await apiCallUnified('/api/user/orders', 'POST', { userId: user.id });
                if (!data.success) throw new Error(data.error);
                
                await renderOrders(data.orders || []);
            } catch (error) {
                console.error('Error fetching orders:', error);
                document.getElementById('ordersList').innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                        <p>Error loading orders. Please try again.</p>
                    </div>
                `;
            }
        }

        // ============================================
        // RENDER ORDERS
        // ============================================
        async function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            totalCount = orders.length;
            pendingCount = 0;
            approvedCount = 0;
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                        <p>No orders yet. Submit your first AFA registration.</p>
                    </div>`;
                updateStats();
                return;
            }
            
            let html = '';
            for (let i = 0; i < orders.length; i++) {
                const order = orders[i];
                const displayStatus = await getOrderDisplayStatus(order);
                
                const status = order.status || 'pending';
                if (status === 'pending' || status === 'processing' || status === 'paid') {
                    if (displayStatus.badgeClass === 'status-paid' || displayStatus.badgeClass === 'status-pending') {
                        pendingCount++;
                    }
                }
                if (status === 'approved') approvedCount++;
                
                const date = order.created_at 
                    ? new Date(order.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) 
                    : 'Just now';
                
                const orderId = order.id ? order.id.toString().substr(-8).toUpperCase() : 'N/A';
                
                let adminNoteHtml = '';
                if (displayStatus.verifying) {
                    adminNoteHtml = `
                        <div class="admin-note ${displayStatus.noteClass}">
                            <div class="verify-loading">
                                <span>Verifying payment status</span>
                                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                            </div>
                        </div>`;
                } else {
                    adminNoteHtml = `<div class="admin-note ${displayStatus.noteClass}">${displayStatus.noteText}</div>`;
                }
                
                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">#${orderId}</span>
                            <span class="order-status ${displayStatus.badgeClass}">${displayStatus.badge}</span>
                        </div>
                        <div class="order-details">
                            <div class="detail-row">
                                <span class="detail-label">Applicant</span>
                                <span class="detail-value">${order.applicant_name || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Phone</span>
                                <span class="detail-value">${order.applicant_phone || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Amount</span>
                                <span class="detail-value">GH₵ ${(order.amount || 13).toFixed(2)}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Payment Ref</span>
                                <span class="detail-value" style="font-size: 11px;">${order.payment_reference || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Date</span>
                                <span class="detail-value">${date}</span>
                            </div>
                        </div>
                        ${adminNoteHtml}
                    </div>
                `;
            }
            
            container.innerHTML = html;
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalOrders').textContent = totalCount;
            document.getElementById('pendingOrders').textContent = pendingCount;
            document.getElementById('approvedOrders').textContent = approvedCount;
        }

        // ============================================
        // START ON PAGE LOAD
        // ============================================
        document.addEventListener('DOMContentLoaded', initOrders);
    </script>
</body>
</html>
