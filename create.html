<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - MTN AFA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }
        .auth-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10,22,40,0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .auth-header-left { display: flex; align-items: center; gap: 12px; }
        .auth-icon {
            width: 40px; height: 40px;
            background: #FFD700;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            border: none;
        }
        .auth-icon span {
            font-size: 13px;
            font-weight: 800;
            color: #1a1a1a;
            letter-spacing: -0.5px;
            font-family: 'Inter', sans-serif;
        }
        .auth-header-text h2 { font-size: 16px; font-weight: 700; }
        .btn-yellow {
            background: #FFD700; color: #1a1a1a;
            font-size: 14px; font-weight: 600; padding: 10px 20px;
            border-radius: 50px; border: none; cursor: pointer;
            text-decoration: none; display: inline-block;
        }
        .auth-content {
            padding: 24px 20px; max-width: 480px;
            margin: 0 auto;
        }
        .auth-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 32px 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .auth-card h3 { color: #1a1a1a; font-size: 24px; font-weight: 700; margin-bottom: 6px; text-align: center; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #1a1a1a; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .form-input {
            width: 100%; padding: 14px 16px; border: 1.5px solid #e0e0e0;
            border-radius: 14px; font-size: 15px; font-family: inherit;
            color: #1a1a1a; background: #fafafa; outline: none;
        }
        .form-input:focus { border-color: #FFD700; background: #fff; box-shadow: 0 0 0 3px rgba(255,215,0,0.15); }
        .form-input::placeholder { color: #aaa; }
        .form-input.error { border-color: #e74c3c; box-shadow: 0 0 0 3px rgba(231,76,60,0.15); }
        .error-msg { color: #e74c3c; font-size: 12px; margin-top: 6px; display: none; }
        .error-msg.show { display: block; }
        .password-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: 1.5px solid #ddd; border-radius: 8px;
            padding: 6px 12px; font-size: 13px; color: #666; cursor: pointer;
        }
        .btn-submit {
            width: 100%; padding: 16px; background: #1a1a1a;
            color: white; font-size: 16px; font-weight: 600;
            border: none; border-radius: 14px; cursor: pointer; margin-top: 8px;
        }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .auth-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .auth-link a { color: #1a1a1a; font-weight: 600; text-decoration: underline; }
        @media (min-width: 768px) {
            .auth-content { max-width: 520px; padding: 40px 24px; }
        }
    </style>
</head>
<body>
    <div style="min-height: 100vh; display: flex; flex-direction: column;">
        <header class="auth-header">
            <div class="auth-header-left">
                <div class="auth-icon">
                    <span>MTN</span>
                </div>
                <div class="auth-header-text">
                    <h2>MTN AFA Portal</h2>
                </div>
            </div>
            <a href="signin.html" class="btn-yellow">Login</a>
        </header>

        <div class="auth-content" style="flex: 1;">
            <div class="auth-card">
                <h3>Create Account</h3>
                <p class="subtitle">Register to manage your AFA activity, and track orders</p>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" class="form-input" placeholder="e.g. John Doe">
                    <p class="error-msg" id="nameError">Please enter your full name.</p>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-input" placeholder="e.g. johndoe">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phoneNumber" class="form-input" placeholder="0240000000" maxlength="10">
                    <p class="error-msg" id="phoneError">Phone number must be exactly 10 digits.</p>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com">
                    <p class="error-msg" id="emailError">Please enter a valid email ending with .com</p>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="createPassword" class="form-input" placeholder="Minimum 6 characters">
                        <button type="button" class="password-toggle" onclick="togglePassword('createPassword', this)">Show</button>
                    </div>
                    <p class="error-msg" id="passwordError">Password must be at least 6 characters.</p>
                </div>

                <button class="btn-submit" id="createBtn" onclick="handleCreateAccount()">Create Account</button>

                <div class="auth-link">
                    Already have an account? <a href="signin.html">Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'Hide';
            } else {
                input.type = 'password';
                btn.textContent = 'Show';
            }
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.com$/.test(email);
        }

        function validatePhone(phone) {
            return /^\d{10}$/.test(phone);
        }

        function showError(id, show) {
            const el = document.getElementById(id);
            const input = el.previousElementSibling;
            if (show) {
                el.classList.add('show');
                if (input && input.classList) input.classList.add('error');
            } else {
                el.classList.remove('show');
                if (input && input.classList) input.classList.remove('error');
            }
        }

        async function handleCreateAccount() {
            const name = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const phone = document.getElementById('phoneNumber').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('createPassword').value;
            const btn = document.getElementById('createBtn');

            let hasError = false;
            if (!name) { showError('nameError', true); hasError = true; } else { showError('nameError', false); }
            if (!validatePhone(phone)) { showError('phoneError', true); hasError = true; } else { showError('phoneError', false); }
            if (!validateEmail(email)) { showError('emailError', true); hasError = true; } else { showError('emailError', false); }
            if (password.length < 6) { showError('passwordError', true); hasError = true; } else { showError('passwordError', false); }

            if (hasError) return;

            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            try {
                // Step 1: Sign up
                const signupData = await apiCall('/api/auth/signup', 'POST', {
                    email, password, fullName: name, phone, username
                });
                
                if (!signupData.success) throw new Error(signupData.error);
                
                let session = signupData.session;
                let user = signupData.user;
                
                // Step 2: If no session (email confirmation may be ON), auto-sign in
                if (!session) {
                    btn.textContent = 'Signing you in...';
                    const loginData = await apiCall('/api/auth/signin', 'POST', { email, password });
                    
                    if (!loginData.success) throw new Error(loginData.error);
                    
                    session = loginData.session;
                    user = loginData.user;
                }
                
                // Step 3: Store everything properly
                if (user && user.id) {
                    const userObj = {
                        id: user.id,
                        name: name,
                        email: email,
                        phone: phone
                    };
                    setUser(userObj);
                    
                    if (session) {
                        setSession(session);
                    }
                    
                    // Store individual keys for dashboard compatibility
                    localStorage.setItem('userName', name);
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userId', user.id);
                    localStorage.setItem('userPhone', phone);
                }
                
                // Step 4: Redirect to dashboard
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                alert('Error: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }
    </script>
</body>
</html>
