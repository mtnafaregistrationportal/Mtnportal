<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://mtn-afa-api.onrender.com https://api.paystack.co; img-src 'self' data:;">
    <title>Payment Status - MTN AFA Portal</title>
    <link rel="stylesheet" href="glass.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-strong: rgba(255, 255, 255, 0.12);
            --glass-bg-hover: rgba(255, 255, 255, 0.16);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-border-light: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --glass-shadow: rgba(0, 0, 0, 0.15);
            --glass-shadow-strong: rgba(0, 0, 0, 0.25);
            --primary-yellow: #FFD700;
            --primary-yellow-glow: rgba(255, 215, 0, 0.3);
            --accent-blue: #5AC8FA;
            --accent-green: #34C759;
            --accent-red: #FF3B30;
            --accent-orange: #FF9500;
            --accent-purple: #AF52DE;
            --text-white: #ffffff;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.45);
            --text-dark: #1a1a1a;
            --bg-deep: #0a0f1a;
            --bg-gradient-start: #0a0f1a;
            --bg-gradient-mid: #0d1b2a;
            --bg-gradient-end: #0a1520;
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 36px;
            --radius-full: 9999px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        html { scroll-behavior: smooth; }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(90, 200, 250, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(175, 82, 222, 0.02) 0%, transparent 50%);
            animation: meshMove 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 var(--primary-yellow-glow); }
            50% { box-shadow: 0 0 20px 4px var(--primary-yellow-glow); }
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 40%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            padding: 20px;
            position: relative;
        }
        .success-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border-radius: var(--radius-xl);
            padding: 44px 32px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 
                0 24px 80px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.4);
            animation: scaleIn 0.5s var(--transition-spring);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .success-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            opacity: 0.6;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #34C759, #30D158);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(52, 199, 89, 0.3);
            animation: fadeInUp 0.5s var(--transition-smooth) 0.1s backwards;
            transition: all var(--transition-fast);
        }
        .success-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(52, 199, 89, 0.4);
        }
        .success-icon svg { width: 40px; height: 40px; color: white; }
        .success-card h2 { 
            color: var(--text-dark); 
            font-size: 26px; 
            font-weight: 800; 
            margin-bottom: 8px; 
            letter-spacing: -0.5px;
            animation: fadeInUp 0.5s var(--transition-smooth) 0.2s backwards;
        }
        .success-card p { 
            color: #666; 
            font-size: 14px; 
            margin-bottom: 24px; 
            line-height: 1.6; 
            animation: fadeInUp 0.5s var(--transition-smooth) 0.3s backwards;
        }
        .reference-box {
            background: rgba(0,0,0,0.03);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #64748b;
            border: 1px solid rgba(0,0,0,0.06);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.5s var(--transition-smooth) 0.4s backwards;
            transition: all var(--transition-fast);
        }
        .reference-box:hover {
            background: rgba(0,0,0,0.05);
            transform: translateY(-1px);
        }
        .reference-box strong { 
            color: var(--text-dark); 
            font-size: 14px; 
            font-weight: 700;
        }
        .processing-note {
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #8a6d0b;
            animation: fadeInUp 0.5s var(--transition-smooth) 0.45s backwards;
        }
        .processing-note.error {
            background: rgba(255, 59, 48, 0.08);
            border-color: rgba(255, 59, 48, 0.2);
            color: #c0392b;
        }
        .processing-note.success {
            background: rgba(52, 199, 89, 0.08);
            border-color: rgba(52, 199, 89, 0.2);
            color: #27ae60;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-yellow), #FFA500);
            color: var(--text-dark);
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: block;
            margin-bottom: 12px;
            transition: all var(--transition-fast);
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.3);
            letter-spacing: 0.3px;
            animation: fadeInUp 0.5s var(--transition-smooth) 0.5s backwards;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0) scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #64748b;
            border: 1.5px solid rgba(0,0,0,0.1);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: all var(--transition-fast);
            animation: fadeInUp 0.5s var(--transition-smooth) 0.6s backwards;
        }
        .btn-secondary:hover {
            background: rgba(0,0,0,0.03);
            border-color: rgba(0,0,0,0.2);
            color: var(--text-dark);
            transform: translateY(-1px);
        }
        .btn-secondary:active {
            transform: translateY(0) scale(0.98);
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255,215,0,0.2);
            border-top-color: var(--primary-yellow);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="success-card" id="successCard">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <h2>Payment Successful!</h2>
        <p>Your payment of <strong>GH₵ 13.40</strong> has been confirmed. Your AFA registration is now pending approval from our team.</p>
        <div class="processing-note" id="processingNote">
            ⏳ Verifying payment and sending confirmation...
        </div>
        <div class="reference-box">
            Reference: <strong id="referenceDisplay">Loading...</strong>
        </div>
        <a href="/Mtnportal/orders.html" class="btn-primary" id="viewOrdersBtn">View My Orders</a>
        <a href="/Mtnportal/dashboard.html" class="btn-secondary">Go to Dashboard</a>
    </div>

    <script>
        // ============================================
        // OPTION 1: Get reference from URL or localStorage
        // If no reference found, redirect to orders page
        // ============================================

        const urlParams = new URLSearchParams(window.location.search);
        let reference = urlParams.get('reference') || urlParams.get('trxref') || '';

        // If no reference in URL, try localStorage (stored during registration)
        if (!reference || reference === 'undefined' || reference === 'null') {
            reference = localStorage.getItem('lastPaymentReference') || '';
        }

        // If still no reference, redirect to orders page immediately (Option 1)
        if (!reference || reference === 'undefined' || reference === 'null') {
            console.log('[SUCCESS-PAGE] No reference found. Redirecting to orders...');
            window.location.replace('/Mtnportal/orders.html');
        } else {
            // Show reference
            document.getElementById('referenceDisplay').textContent = reference;

            // Auto-verify with Paystack and send SMS
            verifyPaymentAndSendSMS(reference);
        }

        // ============================================
        // AUTO-VERIFY: Calls backend to verify + send SMS
        // ============================================
        async function verifyPaymentAndSendSMS(reference) {
            const note = document.getElementById('processingNote');
            const btn = document.getElementById('viewOrdersBtn');

            try {
                note.innerHTML = '<span class="spinner"></span> Verifying payment with Paystack...';
                btn.style.display = 'none';

                const response = await fetch('https://mtn-afa-api.onrender.com/api/payment/verify?reference=' + encodeURIComponent(reference));
                const data = await response.json();

                if (data.success && data.verified) {
                    note.className = 'processing-note success';
                    note.innerHTML = '✅ Payment verified! SMS sent to admin. Your order is being processed.';

                    // Clear stored reference
                    localStorage.removeItem('lastPaymentReference');
                } else if (data.alreadyProcessed) {
                    note.className = 'processing-note success';
                    note.innerHTML = '✅ Already verified! Your order is being processed.';
                } else {
                    note.className = 'processing-note error';
                    note.innerHTML = '⚠️ ' + (data.message || 'Payment verification pending. Please check your orders.');
                }

                btn.style.display = 'block';

            } catch (error) {
                console.error('[SUCCESS-PAGE] Verify error:', error);
                note.className = 'processing-note error';
                note.innerHTML = '⚠️ Could not verify. Please check your orders page.';
                btn.style.display = 'block';
            }
        }
    </script>
</body>
</html>
