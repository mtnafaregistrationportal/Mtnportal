<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - MTN AFA Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        .success-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 40px 28px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .success-icon svg { width: 40px; height: 40px; color: white; }
        .success-card h2 { color: #1a1a1a; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .success-card p { color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        .reference-box {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #64748b;
        }
        .reference-box strong { color: #0f172a; font-size: 14px; }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #FFD700;
            color: #1a1a1a;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: block;
            margin-bottom: 12px;
        }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #64748b;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        .loading {
            color: #666;
            font-size: 14px;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(76, 175, 80, 0.3);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="success-card" id="successCard">
        <div class="spinner" id="spinner"></div>
        <p class="loading" id="loadingText">Verifying payment...</p>
    </div>

    <script src="config.js"></script>
    <script>
        async function verifyPayment() {
            const urlParams = new URLSearchParams(window.location.search);
            const reference = urlParams.get('reference') || urlParams.get('trxref');
            
            const card = document.getElementById('successCard');
            
            if (!reference) {
                card.innerHTML = `
                    <div class="error-msg">No payment reference found.</div>
                    <a href="orders.html" class="btn-primary">View My Orders</a>
                `;
                return;
            }
            
            try {
                // Verify payment with server
                const response = await fetch(`https://mtn-afa-api-3.onrender.com/api/payment/verify?reference=${reference}`);
                const data = await response.json();
                
                if (data.status && data.data.status === 'success') {
                    // Payment successful
                    card.innerHTML = `
                        <div class="success-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <h2>Payment Successful!</h2>
                        <p>Your AFA registration has been submitted and is pending review.</p>
                        <div class="reference-box">
                            Reference: <strong>${reference}</strong>
                        </div>
                        <a href="orders.html" class="btn-primary">View My Orders</a>
                        <a href="dashboard.html" class="btn-secondary">Go to Dashboard</a>
                    `;
                    
                    // Auto-redirect after 5 seconds
                    setTimeout(() => {
                        window.location.href = 'orders.html';
                    }, 5000);
                    
                } else {
                    // Payment failed or pending
                    card.innerHTML = `
                        <div class="error-msg">Payment verification failed or pending.</div>
                        <div class="reference-box">
                            Reference: <strong>${reference}</strong>
                        </div>
                        <a href="register.html" class="btn-primary">Try Again</a>
                        <a href="orders.html" class="btn-secondary">View My Orders</a>
                    `;
                }
            } catch (error) {
                console.error('Verification error:', error);
                card.innerHTML = `
                    <div class="error-msg">Error verifying payment. Please check your orders.</div>
                    <a href="orders.html" class="btn-primary">View My Orders</a>
                    <a href="dashboard.html" class="btn-secondary">Go to Dashboard</a>
                `;
            }
        }
        
        // Run on page load
        verifyPayment();
    </script>
</body>
</html>
