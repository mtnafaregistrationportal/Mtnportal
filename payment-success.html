<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status - MTN AFA Portal</title>
    <link rel="stylesheet" href="glass.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        .success-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 40px 28px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .success-icon svg { width: 40px; height: 40px; color: white; }
        .failed-icon {
            width: 80px;
            height: 80px;
            background: #e74c3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .failed-icon svg { width: 40px; height: 40px; color: white; }
        .success-card h2 { color: #1a1a1a; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .success-card p { color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        .reference-box {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #64748b;
        }
        .reference-box strong { color: #0f172a; font-size: 14px; }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #FFD700;
            color: #1a1a1a;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: block;
            margin-bottom: 12px;
        }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #64748b;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        .loading {
            color: #666;
            font-size: 14px;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(76, 175, 80, 0.3);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #25D366;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-top: 16px;
        }
        .whatsapp-btn svg { width: 20px; height: 20px; }
    </style>
</head>
<body>
    <div class="success-card" id="successCard">
        <div class="spinner" id="spinner"></div>
        <p class="loading" id="loadingText">Verifying payment...</p>
    </div>

    <script src="config.js"></script>
    <script src="glass.js"></script>
    <script>
        const API_BASE_URL = 'https://mtn-afa-api.onrender.com';
        const BASE_PATH = '/Mtnportal';
        
        async function verifyPayment() {
            const urlParams = new URLSearchParams(window.location.search);
            const reference = urlParams.get('reference') || urlParams.get('trxref');
            
            const card = document.getElementById('successCard');
            
            if (!reference) {
                card.innerHTML = `
                    <div class="error-msg">No payment reference found.</div>
                    <a href="${BASE_PATH}/orders.html" class="btn-primary">View My Orders</a>
                `;
                return;
            }
            
            try {
                // FIXED: Use the NEW endpoint that checks database FIRST, then Paystack
                const response = await fetch(`${API_BASE_URL}/api/payment/check-status?reference=${reference}`);
                const data = await response.json();
                
                // SUCCESS: Payment is verified (either from database or Paystack)
                if (data.verified) {
                    card.innerHTML = `
                        <div class="success-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <h2>Payment Successful!</h2>
                        <p>💳 Payment received. Awaiting AFA approval...<<br><br>Your payment of <strong>GH₵ ${data.amount || '13.00'}</strong> has been confirmed. Your AFA registration is now pending approval from our team.</p>
                        <div class="reference-box">
                            Reference: <strong>${reference}</strong>
                        </div>
                        <a href="${BASE_PATH}/orders.html" class="btn-primary">View My Orders</a>
                        <a href="${BASE_PATH}/dashboard.html" class="btn-secondary">Go to Dashboard</a>
                    `;
                    
                    // Auto-redirect to orders after 5 seconds
                    setTimeout(() => {
                        window.location.href = `${BASE_PATH}/orders.html`;
                    }, 5000);
                    
                } else {
                    // FAILED: Payment not completed
                    card.innerHTML = `
                        <div class="failed-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </div>
                        <h2 style="color: #e74c3c;">Payment Not Completed</h2>
                        <p>⚠️ Transaction failed. Your registration will be processed. Please make sure your payment is confirmed so that registration will be completed.<br><br>${data.gateway_response ? '<strong>Reason:</strong> ' + data.gateway_response + '<br><br>' : ''}If you believe this is an error, please contact support.</p>
                        <div class="reference-box">
                            Reference: <strong>${reference}</strong>
                        </div>
                        <a href="${BASE_PATH}/register.html" class="btn-primary">Try Again</a>
                        <a href="${BASE_PATH}/orders.html" class="btn-secondary">View My Orders</a>
                        <a href="https://wa.me/233503107100" target="_blank" class="whatsapp-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12c0 1.82.49 3.53 1.35 5.02L2 22l5.11-1.34A9.93 9.93 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.53 0-2.97-.43-4.2-1.17l-.3-.18-3.03.79.81-2.95-.2-.31A8.02 8.02 0 014 12c0-4.42 3.58-8 8-8s8 3.58 8 8-3.58 8-8 8z"/>
                            </svg>
                            Contact Support
                        </a>
                    `;
                }
            } catch (error) {
                console.error('Verification error:', error);
                card.innerHTML = `
                    <div class="error-msg">Error verifying payment. Please check your orders.</div>
                    <a href="${BASE_PATH}/orders.html" class="btn-primary">View My Orders</a>
                    <a href="${BASE_PATH}/dashboard.html" class="btn-secondary">Go to Dashboard</a>
                `;
            }
        }
        
        verifyPayment();
    </script>
</body>
</html>
