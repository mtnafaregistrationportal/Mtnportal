<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MTN AFA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://mtn-afa-api.onrender.com https://iqzjpdynmnucxswbrkho.supabase.co https://api.paystack.co;">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-strong: rgba(255, 255, 255, 0.12);
            --glass-bg-hover: rgba(255, 255, 255, 0.16);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-border-light: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --glass-shadow: rgba(0, 0, 0, 0.15);
            --glass-shadow-strong: rgba(0, 0, 0, 0.25);
            --primary-yellow: #FFD700;
            --primary-yellow-glow: rgba(255, 215, 0, 0.3);
            --accent-blue: #5AC8FA;
            --accent-green: #34C759;
            --accent-red: #FF3B30;
            --accent-orange: #FF9500;
            --accent-purple: #AF52DE;
            --text-white: #ffffff;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.45);
            --text-dark: #1a1a1a;
            --bg-deep: #0a0f1a;
            --bg-gradient-start: #0a0f1a;
            --bg-gradient-mid: #0d1b2a;
            --bg-gradient-end: #0a1520;
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 36px;
            --radius-full: 9999px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: linear-gradient(160deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 40%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(90, 200, 250, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(175, 82, 222, 0.02) 0%, transparent 50%);
            animation: meshMove 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            transition: all var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }
        .liquid-glass::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
            opacity: 0.6;
        }
        .liquid-glass:hover {
            background: var(--glass-bg-hover);
            box-shadow: 0 12px 40px var(--glass-shadow-strong), inset 0 1px 0 var(--glass-highlight);
            transform: translateY(-2px);
        }
        .liquid-glass-strong {
            background: var(--glass-bg-strong);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 16px 48px var(--glass-shadow-strong), inset 0 1px 0 var(--glass-highlight);
        }
        .login-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s var(--transition-smooth);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 var(--primary-yellow-glow); }
            50% { box-shadow: 0 0 20px 4px var(--primary-yellow-glow); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border-radius: var(--radius-xl);
            padding: 44px 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.4);
            animation: scaleIn 0.5s var(--transition-spring);
            position: relative;
            overflow: hidden;
        }
        .login-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 3s ease-in-out infinite;
            pointer-events: none;
        }
        .login-card h2 { color: var(--text-dark); font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 8px; letter-spacing: -0.5px; }
        .login-card p { color: #666; font-size: 14px; text-align: center; margin-bottom: 32px; font-weight: 400; }
        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-yellow), #FFA500);
            color: var(--text-dark);
            font-size: 11px;
            font-weight: 800;
            padding: 8px 18px;
            border-radius: var(--radius-full);
            margin-bottom: 24px;
            text-align: center;
            width: 100%;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.3);
            animation: pulse-glow 2s ease-in-out infinite;
        }
        .form-group { margin-bottom: 22px; position: relative; }
        .form-group label { display: block; color: var(--text-dark); font-size: 13px; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.3px; }
        .form-input {
            width: 100%; padding: 16px 18px; border: 1.5px solid rgba(0,0,0,0.08);
            border-radius: var(--radius-md); font-size: 15px; font-family: inherit;
            color: var(--text-dark); background: rgba(0,0,0,0.03); outline: none;
            transition: all var(--transition-fast);
        }
        .form-input:focus { border-color: var(--primary-yellow); background: #fff; box-shadow: 0 0 0 4px rgba(255,215,0,0.15); transform: scale(1.01); }
        .form-input::placeholder { color: #aaa; }
        .btn-submit {
            width: 100%; padding: 18px; background: linear-gradient(135deg, #1a1a1a, #2a2a2a); color: white; font-size: 16px; font-weight: 700; border: none;
            border-radius: var(--radius-md); cursor: pointer; transition: all var(--transition-smooth); position: relative; overflow: hidden; letter-spacing: 0.3px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .btn-submit:active { transform: translateY(0) scale(0.98); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .error-text { color: var(--accent-red); font-size: 13px; margin-top: 14px; text-align: center; display: none; font-weight: 500; padding: 8px; background: rgba(255, 59, 48, 0.1); border-radius: var(--radius-sm); }
        .error-text.show { display: block; animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .dashboard-screen { display: none; min-height: 100vh; position: relative; z-index: 1; }
        .dashboard-screen.show { display: block; animation: fadeIn 0.4s var(--transition-smooth); }
        .admin-header {
            display: flex; align-items: center; justify-content: space-between; padding: 16px 24px;
            background: rgba(10, 15, 26, 0.75); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 1px solid var(--glass-border); position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 68px; transition: all var(--transition-smooth);
        }
        .admin-header.scrolled { background: rgba(10, 15, 26, 0.9); box-shadow: 0 4px 30px rgba(0,0,0,0.3); }
        .admin-header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
        .admin-header .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-yellow), #FFA500); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-dark); font-weight: 900; font-size: 11px; letter-spacing: -0.5px; box-shadow: 0 4px 16px rgba(255, 215, 0, 0.3); transition: transform var(--transition-fast); }
        .logo-icon:hover { transform: scale(1.08) rotate(-3deg); }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .btn-header { padding: 10px 18px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-primary); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; backdrop-filter: blur(20px); transition: all var(--transition-fast); }
        .btn-header:hover { background: var(--primary-yellow); color: var(--text-dark); border-color: var(--primary-yellow); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255, 215, 0, 0.3); }
        .btn-logout { padding: 10px 18px; background: rgba(255, 59, 48, 0.15); border: 1px solid rgba(255, 59, 48, 0.3); color: var(--accent-red); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; backdrop-filter: blur(20px); transition: all var(--transition-fast); }
        .btn-logout:hover { background: rgba(255, 59, 48, 0.25); transform: translateY(-1px); }
        .admin-greeting { color: var(--primary-yellow); font-size: 14px; font-weight: 700; margin-right: 12px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        .admin-content { padding: 88px 20px 40px; max-width: 1200px; margin: 0 auto; scroll-margin-top: 80px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 28px; }
        .stat-card { background: var(--glass-bg); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 24px 20px; box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight); transition: all var(--transition-smooth); position: relative; overflow: hidden; animation: fadeInUp 0.5s var(--transition-smooth) backwards; }
        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent); opacity: 0.6; }
        .stat-card:hover { background: var(--glass-bg-hover); transform: translateY(-3px); box-shadow: 0 16px 48px var(--glass-shadow-strong), inset 0 1px 0 var(--glass-highlight); }
        .stat-icon { width: 44px; height: 44px; background: rgba(255, 215, 0, 0.12); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; transition: all var(--transition-fast); }
        .stat-card:hover .stat-icon { transform: scale(1.1) rotate(-5deg); background: rgba(255, 215, 0, 0.2); }
        .stat-icon svg { width: 22px; height: 22px; color: var(--primary-yellow); }
        .stat-value { font-size: 32px; font-weight: 800; color: var(--primary-yellow); letter-spacing: -1px; text-shadow: 0 0 30px rgba(255, 215, 0, 0.2); transition: all var(--transition-fast); }
        .stat-card:hover .stat-value { transform: scale(1.05); }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .tabs { display: flex; gap: 10px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; -ms-overflow-style: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 12px 22px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-full); font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; white-space: nowrap; backdrop-filter: blur(20px); transition: all var(--transition-fast); position: relative; overflow: hidden; }
        .tab:hover { background: var(--glass-bg-hover); color: var(--text-primary); transform: translateY(-1px); }
        .tab.active { background: linear-gradient(135deg, var(--primary-yellow), #FFA500); color: var(--text-dark); border-color: transparent; box-shadow: 0 4px 20px rgba(255, 215, 0, 0.35); font-weight: 700; }
        .tab.active:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255, 215, 0, 0.45); }
        .search-bar { display: flex; gap: 12px; margin-bottom: 20px; }
        .search-input { flex: 1; padding: 14px 18px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-md); color: var(--text-primary); font-size: 14px; outline: none; backdrop-filter: blur(20px); transition: all var(--transition-fast); font-family: inherit; }
        .search-input:focus { border-color: var(--primary-yellow); box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.1); background: var(--glass-bg-hover); }
        .search-input::placeholder { color: var(--text-muted); }
        .search-btn { padding: 14px 24px; background: linear-gradient(135deg, var(--primary-yellow), #FFA500); color: var(--text-dark); border: none; border-radius: var(--radius-md); font-weight: 700; font-size: 14px; cursor: pointer; transition: all var(--transition-fast); box-shadow: 0 4px 16px rgba(255, 215, 0, 0.25); }
        .search-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255, 215, 0, 0.4); }
        .search-btn:active { transform: translateY(0) scale(0.97); }
        .data-section { display: none; }
        .data-section.active { display: block; animation: fadeInUp 0.3s var(--transition-smooth); }
        .user-card {
            background: var(--glass-bg); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 14px;
            position: relative; box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            transition: all var(--transition-smooth); animation: slideInRight 0.4s var(--transition-smooth) backwards;
        }
        .user-card:nth-child(1) { animation-delay: 0.03s; }
        .user-card:nth-child(2) { animation-delay: 0.06s; }
        .user-card:nth-child(3) { animation-delay: 0.09s; }
        .user-card:nth-child(4) { animation-delay: 0.12s; }
        .user-card:nth-child(5) { animation-delay: 0.15s; }
        .user-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent); opacity: 0.5; }
        .user-card:hover { background: var(--glass-bg-hover); transform: translateY(-2px); box-shadow: 0 16px 48px var(--glass-shadow-strong), inset 0 1px 0 var(--glass-highlight); }
        .user-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .user-info { display: flex; align-items: center; gap: 14px; }
        .user-avatar-img { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2.5px solid var(--primary-yellow); flex-shrink: 0; box-shadow: 0 4px 16px rgba(255, 215, 0, 0.2); transition: all var(--transition-fast); }
        .user-card:hover .user-avatar-img { transform: scale(1.08); box-shadow: 0 6px 20px rgba(255, 215, 0, 0.35); }
        .user-avatar-placeholder { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05)); border: 2.5px solid var(--primary-yellow); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: var(--primary-yellow); flex-shrink: 0; box-shadow: 0 4px 16px rgba(255, 215, 0, 0.2); transition: all var(--transition-fast); }
        .user-card:hover .user-avatar-placeholder { transform: scale(1.08); box-shadow: 0 6px 20px rgba(255, 215, 0, 0.35); }
        .user-name { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
        .user-email { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .user-phone { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .status-badge { padding: 5px 14px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700; letter-spacing: 0.3px; backdrop-filter: blur(10px); transition: all var(--transition-fast); }
        .badge-pending { background: rgba(255, 152, 0, 0.15); color: var(--accent-orange); border: 1px solid rgba(255, 152, 0, 0.25); }
        .badge-approved { background: rgba(52, 199, 89, 0.15); color: var(--accent-green); border: 1px solid rgba(52, 199, 89, 0.25); }
        .badge-rejected { background: rgba(255, 59, 48, 0.15); color: var(--accent-red); border: 1px solid rgba(255, 59, 48, 0.25); }
        .badge-suspended { background: rgba(175, 82, 222, 0.15); color: var(--accent-purple); border: 1px solid rgba(175, 82, 222, 0.25); }
        .badge-paid { background: rgba(52, 199, 89, 0.15); color: var(--accent-green); border: 1px solid rgba(52, 199, 89, 0.25); }
        .badge-failed { background: rgba(255, 59, 48, 0.15); color: var(--accent-red); border: 1px solid rgba(255, 59, 48, 0.25); }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
        .detail-item { display: flex; flex-direction: column; }
        .detail-item-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
        .detail-item-value { font-size: 13px; font-weight: 600; margin-top: 3px; color: var(--text-primary); }
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-approve { flex: 1; padding: 12px; background: linear-gradient(135deg, #34C759, #30D158); color: white; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer; min-width: 100px; transition: all var(--transition-fast); box-shadow: 0 4px 16px rgba(52, 199, 89, 0.25); letter-spacing: 0.3px; }
        .btn-approve:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(52, 199, 89, 0.4); }
        .btn-approve:active { transform: translateY(0) scale(0.97); }
        .btn-reject { flex: 1; padding: 12px; background: linear-gradient(135deg, #FF3B30, #FF453A); color: white; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer; min-width: 100px; transition: all var(--transition-fast); box-shadow: 0 4px 16px rgba(255, 59, 48, 0.25); letter-spacing: 0.3px; }
        .btn-reject:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255, 59, 48, 0.4); }
        .btn-reject:active { transform: translateY(0) scale(0.97); }
        .btn-suspend { padding: 12px 18px; background: rgba(175, 82, 222, 0.12); border: 1px solid rgba(175, 82, 222, 0.3); color: var(--accent-purple); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; backdrop-filter: blur(10px); transition: all var(--transition-fast); }
        .btn-suspend:hover { background: rgba(175, 82, 222, 0.2); transform: translateY(-1px); }
        .btn-delete { padding: 12px 18px; background: rgba(255, 59, 48, 0.12); border: 1px solid rgba(255, 59, 48, 0.3); color: var(--accent-red); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; backdrop-filter: blur(10px); transition: all var(--transition-fast); }
        .btn-delete:hover { background: rgba(255, 59, 48, 0.2); transform: translateY(-1px); }
        .payment-row {
            background: var(--glass-bg); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            transition: all var(--transition-smooth); animation: slideInRight 0.4s var(--transition-smooth) backwards;
        }
        .payment-row:hover { background: var(--glass-bg-hover); transform: translateY(-2px); box-shadow: 0 16px 48px var(--glass-shadow-strong), inset 0 1px 0 var(--glass-highlight); }
        .payment-amount { font-size: 20px; font-weight: 800; color: var(--primary-yellow); letter-spacing: -0.5px; }
        .payment-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .attended-dot {
            position: absolute; top: 20px; right: 20px; width: 14px; height: 14px; border-radius: 50%; cursor: pointer;
            transition: all 0.3s var(--transition-spring); z-index: 2;
        }
        .attended-dot.unattended { background: rgba(255,255,255,0.9); box-shadow: 0 0 12px rgba(255,255,255,0.6), 0 0 24px rgba(255,255,255,0.3); animation: pulse-dot 2s ease-in-out infinite; }
        .attended-dot.attended { background: var(--primary-yellow); box-shadow: 0 0 12px rgba(255,215,0,0.6), 0 0 24px rgba(255,215,0,0.3); }
        .attended-dot:hover { transform: scale(1.3); }
        @keyframes pulse-dot { 0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 12px rgba(255,255,255,0.6); } 50% { transform: scale(1.15); opacity: 0.8; box-shadow: 0 0 20px rgba(255,255,255,0.8); } }
        .img-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(20px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.3s var(--transition-smooth); }
        .img-modal.show { display: flex; opacity: 1; }
        .img-modal img { max-width: 100%; max-height: 85vh; border-radius: var(--radius-lg); box-shadow: 0 24px 80px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.4s var(--transition-spring); }
        .img-modal.show img { transform: scale(1); }
        .img-modal-close { position: absolute; top: 24px; right: 24px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); color: white; width: 48px; height: 48px; border-radius: 50%; font-size: 24px; cursor: pointer; transition: all var(--transition-fast); display: flex; align-items: center; justify-content: center; }
        .img-modal-close:hover { background: var(--glass-bg-hover); transform: scale(1.1) rotate(90deg); }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10, 15, 26, 0.92); backdrop-filter: blur(20px); z-index: 999; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px; opacity: 0; transition: opacity 0.3s var(--transition-smooth); }
        .loading-overlay.show { display: flex; opacity: 1; }
        .spinner { width: 48px; height: 48px; border: 3px solid rgba(255,215,0,0.2); border-top-color: var(--primary-yellow); border-radius: 50%; animation: spin 0.8s linear infinite; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 16px 24px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; z-index: 1001; transform: translateX(150%) scale(0.9); transition: all 0.4s var(--transition-spring); backdrop-filter: blur(40px) saturate(180%); box-shadow: 0 16px 48px rgba(0,0,0,0.3); max-width: 400px; border: 1px solid var(--glass-border); }
        .toast.show { transform: translateX(0) scale(1); }
        .toast-success { background: rgba(52, 199, 89, 0.9); color: white; }
        .toast-error { background: rgba(255, 59, 48, 0.9); color: white; }
        .admin-note-input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px; margin-bottom: 12px; outline: none; backdrop-filter: blur(10px); transition: all var(--transition-fast); font-family: inherit; }
        .admin-note-input:focus { border-color: var(--primary-yellow); box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1); background: rgba(255,255,255,0.08); }
        .admin-note-input::placeholder { color: var(--text-muted); }
        .payment-status-banner { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: var(--radius-full); font-size: 12px; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.3px; backdrop-filter: blur(10px); transition: all var(--transition-fast); }
        .payment-status-banner.paid { background: rgba(52, 199, 89, 0.12); color: var(--accent-green); border: 1px solid rgba(52, 199, 89, 0.25); }
        .payment-status-banner.failed { background: rgba(255, 59, 48, 0.12); color: var(--accent-red); border: 1px solid rgba(255, 59, 48, 0.25); }
        .payment-status-banner.pending { background: rgba(255, 152, 0, 0.12); color: var(--accent-orange); border: 1px solid rgba(255, 152, 0, 0.25); }
        .reg-status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: var(--radius-full); font-size: 12px; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.3px; backdrop-filter: blur(10px); transition: all var(--transition-fast); }
        .reg-status-badge.approved { background: rgba(52, 199, 89, 0.12); color: var(--accent-green); border: 1px solid rgba(52, 199, 89, 0.25); }
        .reg-status-badge.rejected { background: rgba(255, 59, 48, 0.12); color: var(--accent-red); border: 1px solid rgba(255, 59, 48, 0.25); }
        .reg-status-badge.pending { background: rgba(255, 152, 0, 0.12); color: var(--accent-orange); border: 1px solid rgba(255, 152, 0, 0.25); }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } .detail-grid { grid-template-columns: repeat(4, 1fr); } .admin-content { padding: 88px 32px 40px; } }
        @media (max-width: 480px) { .login-card { padding: 32px 20px; border-radius: var(--radius-lg); } .admin-header { padding: 12px 16px; } .admin-header h1 { font-size: 15px; } .admin-greeting { display: none; } .stat-value { font-size: 26px; } }
        .empty-state { text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: 14px; animation: fadeIn 0.5s var(--transition-smooth); }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="admin-badge">🔒 ADMIN ACCESS ONLY</div>
            <h2>Admin Login</h2>
            <p>Sign in with your admin credentials</p>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="adminEmail" class="form-input" placeholder="admin@mtnportal.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" class="form-input" placeholder="Enter password">
            </div>
            <button class="btn-submit" id="adminLoginBtn" onclick="adminLogin()">Sign In</button>
            <p class="error-text" id="loginError">Invalid credentials</p>
        </div>
    </div>

    <div class="dashboard-screen" id="dashboardScreen">
        <header class="admin-header" id="adminHeader">
            <div class="logo">
                <div class="logo-icon">MTN</div>
                <h1>Admin Dashboard</h1>
            </div>
            <div class="header-actions">
                <span class="admin-greeting">Daniel, let's go 😂</span>
                <button class="btn-logout" onclick="adminLogout()">Logout</button>
            </div>
        </header>

        <div class="admin-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    </div>
                    <div class="stat-value" id="statTotalUsers">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
                    </div>
                    <div class="stat-value" id="statTotalReg">0</div>
                    <div class="stat-label">Registrations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <div class="stat-value" id="statRevenue">0.00</div>
                    <div class="stat-label">Revenue (GHS)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <div class="stat-value" id="statPending">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('users', this)">👥 Users</div>
                <div class="tab" onclick="switchTab('registrations', this)">📝 Registrations</div>
                <div class="tab" onclick="switchTab('payments', this)">💰 Payments</div>
            </div>

            <div class="search-bar" id="searchBar">
                <input type="text" class="search-input" id="searchInput" placeholder="Search by name, email, phone..." onkeyup="handleSearch()">
                <button class="search-btn" onclick="handleSearch()">Search</button>
            </div>

            <div class="data-section active" id="section-users">
                <div id="usersList"></div>
            </div>
            <div class="data-section" id="section-registrations">
                <div id="registrationsList"></div>
            </div>
            <div class="data-section" id="section-payments">
                <div id="paymentsList"></div>
            </div>
        </div>
    </div>

    <div class="img-modal" id="imgModal" onclick="closeImgModal()">
        <button class="img-modal-close" onclick="closeImgModal()">×</button>
        <img src="" alt="Preview" id="modalImg">
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div style="color:var(--text-muted);font-size:14px;">Processing...</div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>

        // XSS Protection
        function escapeHtml(text) {
          if (!text) return '';
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }

        // SAFE NUMBER FORMATTER - prevents toFixed crashes on null/undefined/NaN
        function safeAmount(value) {
            if (value === null || value === undefined || value === '') return '0.00';
            const num = parseFloat(value);
            if (isNaN(num)) return '0.00';
            return num.toFixed(2);
        }

        let currentAdmin = null;
        let adminToken = sessionStorage.getItem('adminToken') || null;
        let allUsers = [];
        let allRegistrations = [];
        let allPayments = [];

        document.addEventListener('DOMContentLoaded', () => {
            sessionStorage.removeItem('adminToken');
            localStorage.removeItem('adminToken');
            adminToken = null;
            currentAdmin = null;
            showLoginScreen();
            window.addEventListener('scroll', () => {
                const header = document.getElementById('adminHeader');
                if (window.scrollY > 10) { header.classList.add('scrolled'); }
                else { header.classList.remove('scrolled'); }
            });
        });

        function showLoginScreen() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboardScreen').classList.remove('show');
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').classList.remove('show');
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').classList.add('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function adminLogin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const btn = document.getElementById('adminLoginBtn');
            const errorEl = document.getElementById('loginError');

            if (!email || !password) {
                errorEl.textContent = 'Please enter email and password';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorEl.classList.remove('show');

            try {
                const response = await fetch('https://mtn-afa-api.onrender.com/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.error);
                sessionStorage.setItem('adminToken', data.token);
                adminToken = data.token;
                currentAdmin = data.admin;
                showDashboard();
                loadAllData();
            } catch (error) {
                btn.disabled = false;
                btn.textContent = 'Sign In';
                errorEl.textContent = error.message || 'Invalid credentials';
                errorEl.classList.add('show');
            }
        }

        function adminLogout() {
            sessionStorage.removeItem('adminToken');
            localStorage.removeItem('adminToken');
            adminToken = null;
            currentAdmin = null;
            allUsers = [];
            allRegistrations = [];
            allPayments = [];
            showLoginScreen();
            showToast('Logged out successfully', 'success');
        }

        async function adminApiCall(endpoint, method, body) {
            const options = {
                method: method || 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${adminToken}`
                },
                credentials: 'include'
            };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch('https://mtn-afa-api.onrender.com' + endpoint, options);
            return response.json();
        }

        async function loadAllData() {
            await loadUsers();
            await loadRegistrations();
            await loadPayments();
        }

        async function loadUsers() {
            try {
                const data = await adminApiCall('/api/admin/users', 'POST');
                if (!data.success) throw new Error(data.error);
                allUsers = data.users || [];
                document.getElementById('statTotalUsers').textContent = allUsers.length;
                renderUsers();
            } catch (error) {
                if (error.message && (error.message.includes('token') || error.message.includes('denied'))) {
                    adminLogout();
                }
            }
        }

        async function loadRegistrations() {
            try {
                const data = await adminApiCall('/api/admin/orders', 'POST');
                if (!data.success) throw new Error(data.error);
                allRegistrations = data.orders || [];
                document.getElementById('statTotalReg').textContent = allRegistrations.length;
                renderRegistrations();
                updateStats();
            } catch (error) {
                document.getElementById('registrationsList').innerHTML = 
                    '<div class="empty-state"><div class="empty-state-icon">⚠️</div>Error loading registrations: ' + escapeHtml(error.message) + '</div>';
            }
        }

        async function loadPayments() {
            try {
                const data = await adminApiCall('/api/admin/payments', 'POST');
                if (!data.success) throw new Error(data.error);
                allPayments = data.payments || [];
                document.getElementById('statRevenue').textContent = safeAmount(data.totalRevenue);
                renderPayments();
            } catch (error) {
                showToast('Error loading payments: ' + error.message, 'error');
            }
        }

        function updateStats() {
            const pending = allRegistrations.filter(r => {
                const status = r.status || 'pending';
                return status === 'pending' || status === 'paid';
            }).length;
            document.getElementById('statPending').textContent = pending;
        }

        // ============================================
        // VERIFY PAYMENT STATUS FROM PAYSTACK
        // ============================================
        async function verifyPaymentStatus(reference) {
            try {
                const data = await adminApiCall('/api/admin/auto-check-payment', 'POST', { reference });
                return data;
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        // ============================================
        // GET REGISTRATION STATUS WITH PAYSTACK VERIFICATION
        // ============================================
        function getRegistrationStatusBadge(order) {
            const isPaystackVerified = order.paystack_verified === true || order.paystack_verified === 'true';
            const hasPaidAt = order.paid_at && order.paid_at !== null;
            const isPaid = isPaystackVerified || hasPaidAt || order.status === 'paid';

            if (order.status === 'approved') {
                const paymentBadge = isPaid
                    ? '<div class="payment-status-banner paid">✅ PAID</div>' 
                    : '<div class="payment-status-banner failed">❌ FAILED</div>';
                return {
                    html: paymentBadge + '<div class="reg-status-badge approved">✅ COMPLETED</div>',
                    isApproved: true,
                    isRejected: false,
                    showActions: false
                };
            }
            if (order.status === 'rejected') {
                const paymentBadge = isPaid
                    ? '<div class="payment-status-banner paid">✅ PAID</div>' 
                    : '<div class="payment-status-banner failed">❌ FAILED</div>';
                return {
                    html: paymentBadge + '<div class="reg-status-badge rejected">❌ REJECTED</div>',
                    isApproved: false,
                    isRejected: true,
                    showActions: false
                };
            }
            if (order.status === 'failed') {
                return {
                    html: '<div class="payment-status-banner failed">❌ FAILED</div>',
                    isApproved: false,
                    isRejected: false,
                    showActions: true
                };
            }
            if (order.status === 'paid') {
                return {
                    html: '<div class="payment-status-banner paid">✅ PAID</div>',
                    isApproved: false,
                    isRejected: false,
                    showActions: true
                };
            }
            if (isPaid) {
                return {
                    html: '<div class="payment-status-banner paid">✅ PAID</div>',
                    isApproved: false,
                    isRejected: false,
                    showActions: true
                };
            }
            return {
                html: '<div class="payment-status-banner failed">❌ FAILED</div>',
                isApproved: false,
                isRejected: false,
                showActions: true
            };
        }

        // ============================================
        // RENDER USERS - FIXED amount formatting & profile pictures
        // ============================================
        function renderUsers(filter) {
            const container = document.getElementById('usersList');
            let users = allUsers;

            if (filter) {
                const f = filter.toLowerCase();
                users = users.filter(u => 
                    (u.name || '').toLowerCase().includes(f) ||
                    (u.email || '').toLowerCase().includes(f) ||
                    (u.phone_number || '').includes(f)
                );
            }

            if (users.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👤</div>No users found</div>';
                return;
            }

            container.innerHTML = users.map(u => {
                const profilePic = u.profile_picture || u.avatar_url || u.avatar || null;
                const initials = (u.name || 'U').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const isSuspended = u.status === 'suspended';
                const regCount = u.total_registrations || 0;
                // FIXED: use safeAmount to prevent toFixed crashes
                const walletAmount = safeAmount(u.amount_spent);
                const safeName = escapeHtml(u.name || 'Unknown');
                const safeEmail = escapeHtml(u.email || 'No email');
                const safePhone = escapeHtml(u.phone_number || 'No phone');
                const safeId = escapeHtml(String(u.id || ''));

                return `
                    <div class="user-card">
                        <div class="user-card-header">
                            <div class="user-info">
                                ${profilePic 
                                    ? `<img src="${escapeHtml(profilePic)}" class="user-avatar-img" alt="Profile" onerror="this.onerror=null;this.style.display='none';this.parentElement.querySelector('.user-avatar-placeholder').style.display='flex';">
                                       <div class="user-avatar-placeholder" style="display:none;">${initials}</div>`
                                    : `<div class="user-avatar-placeholder">${initials}</div>`
                                }
                                <div>
                                    <div class="user-name">${safeName}</div>
                                    <div class="user-email">${safeEmail}</div>
                                    <div class="user-phone">${safePhone}</div>
                                </div>
                            </div>
                            <span class="status-badge ${isSuspended ? 'badge-suspended' : 'badge-approved'}">
                                ${isSuspended ? 'Suspended' : 'Active'}
                            </span>
                        </div>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <span class="detail-item-label">Amount Spent</span>
                                <span class="detail-item-value">GH₵ ${walletAmount}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-item-label">Registrations</span>
                                <span class="detail-item-value">${regCount}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-item-label">Joined</span>
                                <span class="detail-item-value">${u.created_at ? new Date(u.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-item-label">User ID</span>
                                <span class="detail-item-value" style="font-size:11px;">${safeId.substring(0, 12) + (safeId.length > 12 ? '...' : '')}</span>
                            </div>
                        </div>
                        <div class="action-buttons" style="margin-top:12px;">
                            ${isSuspended 
                                ? `<button class="btn-approve" onclick="enableUser('${safeId}')">✓ Resume</button>`
                                : `<button class="btn-suspend" onclick="suspendUser('${safeId}')">⏸ Suspend</button>`
                            }
                            <button class="btn-delete" onclick="deleteUser('${safeId}')">🗑 Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // RENDER REGISTRATIONS - FIXED amount formatting
        // ============================================
        function renderRegistrations(filter) {
            const container = document.getElementById('registrationsList');

            if (!allRegistrations || allRegistrations.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div>No registrations found</div>';
                return;
            }

            let regs = [...allRegistrations];

            if (filter) {
                const f = filter.toLowerCase();
                regs = regs.filter(r => 
                    (r.applicant_name || '').toLowerCase().includes(f) ||
                    (r.applicant_phone || '').includes(f) ||
                    (r.id_number || '').includes(f)
                );
            }

            regs.sort((a, b) => {
                if (a.admin_attended !== b.admin_attended) {
                    return a.admin_attended ? 1 : -1;
                }
                return new Date(b.created_at) - new Date(a.created_at);
            });

            if (regs.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div>No registrations match your search</div>';
                return;
            }

            let html = '';
            for (let i = 0; i < regs.length; i++) {
                try {
                    const r = regs[i];
                    const statusInfo = getRegistrationStatusBadge(r);

                    let dotClass = 'unattended';
                    if (r.status === 'approved') {
                        dotClass = 'attended';
                    } else if (r.status !== 'rejected') {
                        dotClass = r.admin_attended ? 'attended' : 'unattended';
                    }

                    const isPaid = r.paystack_verified === true || r.paystack_verified === 'true' || r.paid_at || r.status === 'paid';
                    // FIXED: safe amount formatting
                    const displayAmount = r.status === 'failed' ? 0.00 : parseFloat(r.amount || 13.40);

                    const safeName = escapeHtml(r.applicant_name || 'Unknown');
                    const safePhone = escapeHtml(r.applicant_phone || 'No phone');
                    const safeId = escapeHtml(r.id_number || 'N/A');
                    const safeLocation = escapeHtml(r.location || 'N/A');
                    const safeDob = escapeHtml(r.dob || 'N/A');
                    const safeOccupation = escapeHtml(r.occupation || 'N/A');
                    const safeRef = escapeHtml(r.payment_reference || 'N/A');
                    const safeNote = escapeHtml(r.admin_note || '');

                    const idStr = String(r.id || '');
                    const orderIdShort = idStr ? idStr.substring(0, 12) + '...' : 'N/A';
                    const dateStr = r.created_at ? new Date(r.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A';
                    // FIXED: use safeAmount
                    const amount = safeAmount(displayAmount);

                    html += `
                        <div class="user-card" style="position:relative;">
                            <div class="attended-dot ${dotClass}" 
                                 onclick="markAttended('${idStr}', this)" 
                                 title="${r.status === 'approved' ? 'Completed' : (r.status === 'rejected' ? 'Rejected' : (r.admin_attended ? 'Attended' : 'Click to mark as attended'))}"></div>

                            ${statusInfo.html}

                            <div class="user-card-header">
                                <div class="user-info">
                                    <div class="user-avatar-placeholder">${safeName[0] || 'U'}</div>
                                    <div>
                                        <div class="user-name">${safeName}</div>
                                        <div class="user-email">${safePhone}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="detail-grid">
                                <div class="detail-item">
                                    <span class="detail-item-label">Ghana Card ID</span>
                                    <span class="detail-item-value">${safeId}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-item-label">Location</span>
                                    <span class="detail-item-value">${safeLocation}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-item-label">Date of Birth</span>
                                    <span class="detail-item-value">${safeDob}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-item-label">Occupation</span>
                                    <span class="detail-item-value">${safeOccupation}</span>
                                </div>
                            </div>
                            <div class="detail-grid" style="margin-top:8px;">
                                <div class="detail-item">
                                    <span class="detail-item-label">Amount</span>
                                    <span class="detail-item-value">GH₵ ${amount}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-item-label">Payment Ref</span>
                                    <span class="detail-item-value" style="font-size:11px;">${safeRef}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-item-label">Date</span>
                                    <span class="detail-item-value">${dateStr}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-item-label">Order ID</span>
                                    <span class="detail-item-value" style="font-size:11px;">${orderIdShort}</span>
                                </div>
                            </div>
                            ${statusInfo.showActions ? `
                                <input type="text" class="admin-note-input" id="note-${idStr}" placeholder="Add note (optional)">
                                <div class="action-buttons">
                                    <button class="btn-approve" onclick="approveRegistration('${idStr}')">✓ Approve</button>
                                    <button class="btn-reject" onclick="rejectRegistration('${idStr}')">✕ Reject</button>
                                </div>
                            ` : safeNote ? `<div style="margin-top:10px;padding:10px;background:rgba(255,193,7,0.1);border-radius:8px;font-size:12px;color:#FFC107;">MTN AFA NOTE: ${safeNote}</div>` : ''}

                            <div class="action-buttons" style="margin-top:8px;">
                                <button class="btn-delete" onclick="deleteRegistration('${idStr}')">🗑 Hide from Admin</button>
                            </div>
                        </div>
                    `;
                } catch (itemError) {
                    html += '<div style="color:var(--accent-red);padding:10px;">Error rendering item ' + i + '</div>';
                }
            }

            container.innerHTML = html;
        }

        // ============================================
        // RENDER PAYMENTS - FIXED amount formatting
        // ============================================
        function renderPayments(filter) {
            const container = document.getElementById('paymentsList');
            let payments = allPayments;

            if (filter) {
                const f = filter.toLowerCase();
                payments = payments.filter(p => 
                    (p.name || '').toLowerCase().includes(f) ||
                    (p.phone || '').includes(f) ||
                    (p.id_number || '').includes(f) ||
                    (p.reference || '').includes(f)
                );
            }

            payments.sort((a, b) => {
                if (a.paymentStatus !== b.paymentStatus) {
                    return a.paymentStatus === 'paid' ? -1 : 1;
                }
                return new Date(b.created_at) - new Date(a.created_at);
            });

            if (payments.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💰</div>No payments found</div>';
                return;
            }

            container.innerHTML = payments.map(p => {
                const isPaid = p.paymentStatus === 'paid';
                const statusBadge = isPaid 
                    ? '<span class="status-badge badge-paid" style="font-size:10px;">✓ PAID</span>'
                    : '<span class="status-badge badge-failed" style="font-size:10px;">✕ FAILED</span>';

                return `
                    <div class="payment-row" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <div>
                                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                                    ${statusBadge}
                                    <span class="payment-amount" style="font-size:16px;">GH₵ ${safeAmount(p.amount)}</span>
                                </div>
                                <div class="payment-meta"><strong>${escapeHtml(p.name || 'Unknown')}</strong> • ${escapeHtml(p.phone || 'No phone')}</div>
                                <div class="payment-meta">Ghana Card: ${escapeHtml(p.id_number || 'N/A')}</div>
                                <div class="payment-meta">Ref: ${escapeHtml(p.reference || 'N/A')} • ${p.created_at ? new Date(p.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A'}</div>
                            </div>
                            <button class="btn-delete" onclick="deletePayment('${String(p.id)}')" style="flex-shrink: 0;">🗑 Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // ALL ACTION HANDLERS - FIXED to use loadAllData()
        // ============================================
        async function markAttended(regId, dotElement) {
            if (dotElement.classList.contains('attended')) return;
            try {
                const data = await adminApiCall('/api/admin/mark-attended', 'POST', { orderId: regId });
                if (data.success) {
                    dotElement.classList.remove('unattended');
                    dotElement.classList.add('attended');
                    dotElement.title = 'Attended';
                    showToast('Marked as attended', 'success');
                    await loadAllData();
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function approveRegistration(regId) {
            showLoading(true);
            const note = document.getElementById('note-' + regId)?.value || '';
            try {
                const data = await adminApiCall('/api/admin/approve-order', 'POST', {
                    orderId: regId,
                    adminNote: note,
                    adminId: currentAdmin.id
                });
                if (!data.success) throw new Error(data.error);
                showLoading(false);
                showToast('Registration approved!', 'success');
                await loadAllData();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function rejectRegistration(regId) {
            showLoading(true);
            const note = document.getElementById('note-' + regId)?.value || '';
            if (!note) {
                showLoading(false);
                showToast('Please add a note explaining the rejection.', 'error');
                return;
            }
            try {
                const data = await adminApiCall('/api/admin/reject-order', 'POST', {
                    orderId: regId,
                    adminNote: note,
                    adminId: currentAdmin.id
                });
                if (!data.success) throw new Error(data.error);
                showLoading(false);
                showToast('Registration rejected.', 'success');
                await loadAllData();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function deletePayment(paymentId) {
            if (!confirm('Are you sure you want to delete this payment record? This will NOT affect the user order history or revenue.')) return;
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/delete-payment', 'POST', { orderId: paymentId });
                if (!data.success) throw new Error(data.error);
                showLoading(false);
                showToast('Payment deleted', 'success');
                await loadAllData();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function deleteRegistration(regId) {
            if (!confirm('This will hide the registration from the admin dashboard only. The user will still see it in their order history. Continue?')) return;
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/delete-order', 'POST', { orderId: regId });
                if (!data.success) throw new Error(data.error);
                showLoading(false);
                showToast('Registration hidden from admin view', 'success');
                await loadAllData();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function suspendUser(userId) {
            if (!confirm('Are you sure you want to suspend this user?')) return;
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/suspend-user', 'POST', { userId });
                if (!data.success) throw new Error(data.error);
                showLoading(false);
                showToast('User suspended', 'success');
                await loadAllData();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function enableUser(userId) {
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/enable-user', 'POST', { userId });
                if (!data.success) throw new Error(data.error);
                showLoading(false);
                showToast('User resumed', 'success');
                await loadAllData();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function deleteUser(userId) {
            if (!confirm('WARNING: This will permanently delete the user and all their data. Continue?')) return;
            if (!confirm('Are you absolutely sure? This cannot be undone.')) return;
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/delete-user', 'POST', { userId });
                if (!data.success) throw new Error(data.error);
                showLoading(false);
                showToast('User deleted', 'success');
                await loadAllData();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        function switchTab(tabName, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.data-section').forEach(s => s.classList.remove('active'));

            if (element) {
                element.classList.add('active');
            } else {
                const tabs = document.querySelectorAll('.tab');
                if (tabName === 'users' && tabs[0]) tabs[0].classList.add('active');
                if (tabName === 'registrations' && tabs[1]) tabs[1].classList.add('active');
                if (tabName === 'payments' && tabs[2]) tabs[2].classList.add('active');
            }

            document.getElementById('section-' + tabName).classList.add('active');

            if (tabName === 'users') renderUsers();
            if (tabName === 'registrations') renderRegistrations();
            if (tabName === 'payments') renderPayments();
        }

        function handleSearch() {
            const filter = document.getElementById('searchInput').value.trim();
            const activeTab = document.querySelector('.tab.active');
            const tabText = activeTab ? activeTab.textContent.toLowerCase() : '';

            if (tabText.includes('user')) renderUsers(filter);
            else if (tabText.includes('registration')) renderRegistrations(filter);
            else if (tabText.includes('payment')) renderPayments(filter);
        }

        function openImgModal(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('imgModal').classList.add('show');
        }

        function closeImgModal() {
            document.getElementById('imgModal').classList.remove('show');
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.add('show');
            } else {
                setTimeout(() => overlay.classList.remove('show'), 200);
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast toast-' + (type || 'success');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeImgModal();
        });

        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') adminLogin();
        });
    </script>
</body>
</html>
