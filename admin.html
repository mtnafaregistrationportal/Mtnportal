        async function deleteRegistration(regId) {
            if (!confirm('This will hide the registration from the admin dashboard only. The user will still see it in their order history. Continue?')) return;
            
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/delete-order', 'POST', {
                    orderId: regId
                });
                
                if (!data.success) throw new Error(data.error);
                
                showLoading(false);
                showToast('Registration hidden from admin view', 'success');
                await loadRegistrations();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function suspendUser(userId) {
            if (!confirm('Are you sure you want to suspend this user?')) return;
            
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/suspend-user', 'POST', { userId });
                if (!data.success) throw new Error(data.error);
                
                showLoading(false);
                showToast('User suspended', 'success');
                await loadUsers();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function enableUser(userId) {
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/enable-user', 'POST', { userId });
                if (!data.success) throw new Error(data.error);
                
                showLoading(false);
                showToast('User resumed', 'success');
                await loadUsers();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function deleteUser(userId) {
            if (!confirm('WARNING: This will permanently delete the user and all their data. Continue?')) return;
            if (!confirm('Are you absolutely sure? This cannot be undone.')) return;
            
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/delete-user', 'POST', { userId });
                if (!data.success) throw new Error(data.error);
                
                showLoading(false);
                showToast('User deleted', 'success');
                await loadUsers();
                await loadRegistrations();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        function openImgModal(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('imgModal').classList.add('show');
        }

        function closeImgModal() {
            document.getElementById('imgModal').classList.remove('show');
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.add('show');
            } else {
                setTimeout(() => overlay.classList.remove('show'), 200);
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast toast-' + (type || 'success');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeImgModal();
        });
        
        // Enter key on login
        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') adminLogin();
        });
    </script>
</body>
