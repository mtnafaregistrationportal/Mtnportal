<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MTN AFA Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-yellow: #FFD700;
            --dark-bg: #0a1628;
            --dark-bg-gradient: linear-gradient(135deg, #0a1628 0%, #0d2b3a 50%, #0a1f2e 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg-gradient);
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
        }
        .login-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 40px 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card h2 { color: #1a1a1a; font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .login-card p { color: #666; font-size: 14px; text-align: center; margin-bottom: 28px; }
        .admin-badge {
            display: inline-block;
            background: var(--primary-yellow);
            color: #1a1a1a;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 50px;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #1a1a1a; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .form-input {
            width: 100%; padding: 14px 16px; border: 1.5px solid #e0e0e0;
            border-radius: 14px; font-size: 15px; font-family: inherit;
            color: #1a1a1a; background: #fafafa; outline: none;
        }
        .form-input:focus { border-color: #FFD700; background: #fff; box-shadow: 0 0 0 3px rgba(255,215,0,0.15); }
        .btn-submit { width: 100%; padding: 16px; background: #1a1a1a; color: white; font-size: 16px; font-weight: 600; border: none; border-radius: 14px; cursor: pointer; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-text { color: #e74c3c; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
        .error-text.show { display: block; }

        .dashboard-screen { display: none; min-height: 100vh; }
        .dashboard-screen.show { display: block; }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10, 22, 40, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .admin-header h1 { font-size: 18px; font-weight: 700; }
        .admin-header .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 36px; height: 36px; background: var(--primary-yellow); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #1a1a1a; font-weight: 800; font-size: 12px; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .btn-header { padding: 8px 16px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-white); border-radius: 10px; font-size: 13px; cursor: pointer; text-decoration: none; }
        .btn-header:hover { background: var(--primary-yellow); color: #1a1a1a; border-color: var(--primary-yellow); }
        .btn-logout { padding: 8px 16px; background: rgba(231, 76, 60, 0.2); border: 1px solid rgba(231, 76, 60, 0.4); color: #e74c3c; border-radius: 10px; font-size: 13px; cursor: pointer; }
        .admin-greeting { color: var(--primary-yellow); font-size: 14px; font-weight: 600; margin-right: 12px; }

        .admin-content { padding: 20px; max-width: 1200px; margin: 0 auto; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; }
        .stat-icon { width: 40px; height: 40px; background: rgba(255, 215, 0, 0.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .stat-icon svg { width: 20px; height: 20px; color: var(--primary-yellow); }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--primary-yellow); }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
        .tab { padding: 10px 18px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 50px; font-size: 13px; font-weight: 500; color: var(--text-light); cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--primary-yellow); color: #1a1a1a; border-color: var(--primary-yellow); }

        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-input { flex: 1; padding: 12px 16px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-white); font-size: 14px; outline: none; }
        .search-btn { padding: 12px 20px; background: var(--primary-yellow); color: #1a1a1a; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }

        .data-section { display: none; }
        .data-section.active { display: block; }

        .user-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 12px;
            position: relative;
        }
        .user-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid var(--primary-yellow); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--primary-yellow); }
        .user-name { font-size: 15px; font-weight: 600; }
        .user-email { font-size: 12px; color: var(--text-muted); }
        .user-phone { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 600; }
        .badge-pending { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
        .badge-approved { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .badge-rejected { background: rgba(244, 67, 54, 0.2); color: #F44336; }
        .badge-suspended { background: rgba(156, 39, 176, 0.2); color: #9C27B0; }

        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        .detail-item { display: flex; flex-direction: column; }
        .detail-item-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
        .detail-item-value { font-size: 13px; font-weight: 500; margin-top: 2px; }

        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-approve { flex: 1; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; min-width: 100px; }
        .btn-reject { flex: 1; padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; min-width: 100px; }
        .btn-suspend { padding: 10px 16px; background: rgba(156, 39, 176, 0.2); border: 1px solid rgba(156, 39, 176, 0.4); color: #9C27B0; border-radius: 10px; font-size: 13px; cursor: pointer; }
        .btn-delete { padding: 10px 16px; background: rgba(231, 76, 60, 0.2); border: 1px solid rgba(231, 76, 60, 0.4); color: #e74c3c; border-radius: 10px; font-size: 13px; cursor: pointer; }
        .admin-note-input { width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-white); font-size: 13px; margin-bottom: 10px; outline: none; }

        .payment-row {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .payment-amount { font-size: 18px; font-weight: 700; color: var(--primary-yellow); }
        .payment-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        /* NEW: Attended dot indicator */
        .attended-dot {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .attended-dot.unattended {
            background: white;
            box-shadow: 0 0 8px rgba(255,255,255,0.8);
            animation: pulse 2s infinite;
        }
        .attended-dot.attended {
            background: var(--primary-yellow);
            box-shadow: 0 0 8px rgba(255,215,0,0.6);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        .img-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .img-modal.show { display: flex; }
        .img-modal img { max-width: 100%; max-height: 85vh; border-radius: 12px; }
        .img-modal-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 24px; cursor: pointer; }

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10, 22, 40, 0.9); z-index: 999; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
        .loading-overlay.show { display: flex; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,215,0,0.3); border-top-color: var(--primary-yellow); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast { position: fixed; bottom: 20px; right: 20px; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; z-index: 1001; transform: translateX(150%); transition: transform 0.3s ease; }
        .toast.show { transform: translateX(0); }
        .toast-success { background: #4CAF50; color: white; }
        .toast-error { background: #e74c3c; color: white; }

        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } .detail-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="admin-badge">🔒 ADMIN ACCESS ONLY</div>
            <h2>Admin Login</h2>
            <p>Sign in with your admin credentials</p>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="adminEmail" class="form-input" placeholder="admin@mtnportal.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" class="form-input" placeholder="Enter password">
            </div>
            <button class="btn-submit" id="adminLoginBtn" onclick="adminLogin()">Sign In</button>
            <p class="error-text" id="loginError">Invalid credentials</p>
        </div>
    </div>

    <div class="dashboard-screen" id="dashboardScreen">
        <header class="admin-header">
            <div class="logo">
                <div class="logo-icon">MTN</div>
                <h1>Admin Dashboard</h1>
            </div>
            <div class="header-actions">
                <span class="admin-greeting">Daniel, let's go 😂</span>
                <button class="btn-logout" onclick="adminLogout()">Logout</button>
            </div>
        </header>

        <div class="admin-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    </div>
                    <div class="stat-value" id="statTotalUsers">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
                    </div>
                    <div class="stat-value" id="statTotalReg">0</div>
                    <div class="stat-label">Registrations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <div class="stat-value" id="statRevenue">0</div>
                    <div class="stat-label">Revenue (GHS)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <div class="stat-value" id="statPending">0</div>
                    <div class="stat-label">Pending/Approved</div>
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('users')">👥 Users</div>
                <div class="tab" onclick="switchTab('registrations')">📝 Registrations</div>
                <div class="tab" onclick="switchTab('payments')">💰 Payments</div>
            </div>

            <div class="search-bar" id="searchBar">
                <input type="text" class="search-input" id="searchInput" placeholder="Search by name, email, phone..." onkeyup="handleSearch()">
                <button class="search-btn" onclick="handleSearch()">Search</button>
            </div>

            <div class="data-section active" id="section-users">
                <div id="usersList"></div>
            </div>
            <div class="data-section" id="section-registrations">
                <div id="registrationsList"></div>
            </div>
            <div class="data-section" id="section-payments">
                <div id="paymentsList"></div>
            </div>
        </div>
    </div>

    <div class="img-modal" id="imgModal" onclick="closeImgModal()">
        <button class="img-modal-close" onclick="closeImgModal()">×</button>
        <img src="" alt="Preview" id="modalImg">
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div style="color:var(--text-muted);font-size:14px;">Processing...</div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script>
        let currentAdmin = null;
        let adminToken = null;
        let allUsers = [];
        let allRegistrations = [];
        let allPayments = [];

        document.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('adminToken');
            if (savedToken) {
                adminToken = savedToken;
                verifyTokenAndShowDashboard();
            }
        });

        async function verifyTokenAndShowDashboard() {
            try {
                const data = await adminApiCall('/api/admin/users', 'POST');
                if (data.success) {
                    currentAdmin = { id: 'admin_001', email: 'mtnportal34@gmail.com', role: 'admin' };
                    showDashboard();
                    loadAllData();
                } else {
                    throw new Error('Invalid token');
                }
            } catch (error) {
                console.error('Token verification failed:', error);
                localStorage.removeItem('adminToken');
                adminToken = null;
                showLoginScreen();
            }
        }

        function showLoginScreen() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboardScreen').classList.remove('show');
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').classList.add('show');
        }

        async function adminLogin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const btn = document.getElementById('adminLoginBtn');
            const errorEl = document.getElementById('loginError');

            if (!email || !password) {
                errorEl.textContent = 'Please enter email and password';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorEl.classList.remove('show');

            try {
                const response = await fetch('https://mtn-afa-api.onrender.com/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!data.success) throw new Error(data.error);

                adminToken = data.token;
                localStorage.setItem('adminToken', adminToken);
                currentAdmin = data.admin;
                
                showDashboard();
                loadAllData();

            } catch (error) {
                btn.disabled = false;
                btn.textContent = 'Sign In';
                errorEl.textContent = error.message || 'Invalid credentials';
                errorEl.classList.add('show');
            }
        }

        function adminLogout() {
            localStorage.removeItem('adminToken');
            adminToken = null;
            currentAdmin = null;
            allUsers = [];
            allRegistrations = [];
            allPayments = [];
            showLoginScreen();
        }

        async function adminApiCall(endpoint, method, body) {
            const options = {
                method: method || 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${adminToken}`
                },
                credentials: 'include'
            };
            if (body) options.body = JSON.stringify(body);
            
            const response = await fetch('https://mtn-afa-api.onrender.com' + endpoint, options);
            return response.json();
        }

        async function loadAllData() {
            await loadUsers();
            await loadRegistrations();
            await loadPayments();
        }

        async function loadUsers() {
            try {
                const data = await adminApiCall('/api/admin/users', 'POST');
                if (!data.success) throw new Error(data.error);
                
                allUsers = data.users || [];
                document.getElementById('statTotalUsers').textContent = allUsers.length;
                renderUsers();
            } catch (error) {
                console.error('Error loading users:', error);
                if (error.message.includes('token') || error.message.includes('denied')) {
                    adminLogout();
                }
            }
        }

        async function loadRegistrations() {
            try {
                const data = await adminApiCall('/api/admin/orders', 'POST');
                if (!data.success) throw new Error(data.error);
                
                allRegistrations = data.orders || [];
                document.getElementById('statTotalReg').textContent = allRegistrations.length;
                renderRegistrations();
                updateStats();
            } catch (error) {
                console.error('Error loading registrations:', error);
            }
        }

        async function loadPayments() {
            try {
                const data = await adminApiCall('/api/admin/payments', 'POST');
                if (!data.success) throw new Error(data.error);
                
                allPayments = data.payments || [];
                
                // Calculate total revenue from successful payments
                let revenue = 0;
                allPayments.forEach(p => {
                    revenue += (p.amount || 0);
                });
                document.getElementById('statRevenue').textContent = revenue.toFixed(2);
                renderPayments();
            } catch (error) {
                console.error('Error loading payments:', error);
            }
        }

        function updateStats() {
            // Pending = registrations that are NOT approved (pending, paid, rejected)
            const pending = allRegistrations.filter(r => r.status !== 'approved').length;
            document.getElementById('statPending').textContent = pending;
        }

        function renderUsers(filter) {
            const container = document.getElementById('usersList');
            let users = allUsers;
            
            if (filter) {
                const f = filter.toLowerCase();
                users = users.filter(u => 
                    (u.name || '').toLowerCase().includes(f) ||
                    (u.email || '').toLowerCase().includes(f) ||
                    (u.phone_number || '').includes(f)
                );
            }

            if (users.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">No users found</p>';
                return;
            }

            container.innerHTML = users.map(u => {
                const initials = (u.name || 'U').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const isSuspended = u.status === 'suspended';
                // Registration count from orders or total_registrations field
                const regCount = u.total_registrations || 0;
                // Wallet = amount spent on registrations (GHS 13 per registration)
                const walletAmount = (regCount * 13).toFixed(2);
                
                return `
                    <div class="user-card">
                        <div class="user-card-header">
                            <div class="user-info">
                                <div class="user-avatar-placeholder">${initials}</div>
                                <div>
                                    <div class="user-name">${u.name || 'Unknown'}</div>
                                    <div class="user-email">${u.email || 'No email'}</div>
                                    <div class="user-phone">${u.phone_number || 'No phone'}</div>
                                </div>
                            </div>
                            <span class="status-badge ${isSuspended ? 'badge-suspended' : 'badge-approved'}">
                                ${isSuspended ? 'Suspended' : 'Active'}
                            </span>
                        </div>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <span class="detail-item-label">Wallet</span>
                                <span class="detail-item-value">GH₵ ${walletAmount}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-item-label">Registrations</span>
                                <span class="detail-item-value">${regCount}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-item-label">Joined</span>
                                <span class="detail-item-value">${u.created_at ? new Date(u.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A'}</span>
                            </div>
                        </div>
                        <div class="action-buttons" style="margin-top:12px;">
                            ${isSuspended 
                                ? `<button class="btn-approve" onclick="enableUser('${u.id}')">✓ Resume</button>`
                                : `<button class="btn-suspend" onclick="suspendUser('${u.id}')">⏸ Suspend</button>`
                            }
                            <button class="btn-delete" onclick="deleteUser('${u.id}')">🗑 Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderRegistrations(filter) {
            const container = document.getElementById('registrationsList');
            let regs = allRegistrations;
            
            if (filter) {
                const f = filter.toLowerCase();
                regs = regs.filter(r => 
                    (r.applicant_name || '').toLowerCase().includes(f) ||
                    (r.applicant_phone || '').includes(f) ||
                    (r.id_number || '').includes(f)
                );
            }

            // Sort: unattended first, then by date (newest first)
            regs.sort((a, b) => {
                if (a.admin_attended !== b.admin_attended) {
                    return a.admin_attended ? 1 : -1; // Unattended first
                }
                return new Date(b.created_at) - new Date(a.created_at);
            });

            if (regs.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">No registrations found</p>';
                return;
            }

            container.innerHTML = regs.map(r => {
                const status = r.status || 'pending';
                const statusClass = 'badge-' + status;
                const statusText = status === 'approved' ? 'Approved' : 
                                  status === 'rejected' ? 'Rejected' : 
                                  status === 'paid' ? 'Paid - Pending' : 'Pending';

                const showActions = status !== 'approved' && status !== 'rejected';
                const isAttended = r.admin_attended;
                
                return `
                    <div class="user-card" style="position:relative;">
                        <div class="attended-dot ${isAttended ? 'attended' : 'unattended'}" 
                             onclick="markAttended('${r.id}', this)" 
                             title="${isAttended ? 'Attended' : 'Click to mark as attended'}"></div>
                        <div class="user-card-header">
                            <div class="user-info">
                                <div class="user-avatar-placeholder">${(r.applicant_name || 'U')[0]}</div>
                                <div>
                                    <div class="user-name">${r.applicant_name || 'Unknown'}</div>
                                    <div class="user-email">${r.applicant_phone || 'No phone'}</div>
                                </div>
                            </div>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <span class="detail-item-label">Ghana Card ID</span>
                                <span class="detail-item-value">${r.id_number || 'N/A'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-item-label">Location</span>
                                <span class="detail-item-value">${r.location || 'N/A'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-item-label">Date of Birth</span>
                                <span class="detail-item-value">${r.dob || 'N/A'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-item-label">Occupation</span>
                                <span class="detail-item-value">${r.occupation || 'N/A'}</span>
                            </div>
                        </div>
                        <div class="detail-grid" style="margin-top:8px;">
                            <div class="detail-item">
                                <span class="detail-item-label">Amount</span>
                                <span class="detail-item-value">GH₵ ${(r.amount || 15).toFixed(2)}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-item-label">Payment Ref</span>
                                <span class="detail-item-value" style="font-size:11px;">${r.payment_reference || 'N/A'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-item-label">Date</span>
                                <span class="detail-item-value">${r.created_at ? new Date(r.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A'}</span>
                            </div>
                        </div>
                        ${showActions ? `
                            <input type="text" class="admin-note-input" id="note-${r.id}" placeholder="Add note (optional)">
                            <div class="action-buttons">
                                <button class="btn-approve" onclick="approveRegistration('${r.id}')">✓ Approve</button>
                                <button class="btn-reject" onclick="rejectRegistration('${r.id}')">✕ Reject</button>
                            </div>
                        ` : r.admin_note ? `<div style="margin-top:10px;padding:10px;background:rgba(255,193,7,0.1);border-radius:8px;font-size:12px;color:#FFC107;">Note: ${r.admin_note}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderPayments(filter) {
            const container = document.getElementById('paymentsList');
            let payments = allPayments;
            
            if (filter) {
                const f = filter.toLowerCase();
                payments = payments.filter(p => 
                    (p.name || '').toLowerCase().includes(f) ||
                    (p.phone || '').includes(f) ||
                    (p.id_number || '').includes(f)
                );
            }

            if (payments.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">No payments found</p>';
                return;
            }

            container.innerHTML = payments.map(p => `
                <div class="payment-row">
                    <div>
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                            <span class="status-badge badge-approved" style="font-size:10px;">✓ PAID</span>
                            <span class="payment-amount" style="font-size:16px;">GH₵ ${(p.amount || 0).toFixed(2)}</span>
                        </div>
                        <div class="payment-meta"><strong>${p.name || 'Unknown'}</strong> • ${p.phone || 'No phone'}</div>
                        <div class="payment-meta">Ghana Card: ${p.id_number || 'N/A'}</div>
                        <div class="payment-meta">${p.reference || 'N/A'} • ${p.created_at ? new Date(p.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A'}</div>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.data-section').forEach(s => s.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById('section-' + tabName).classList.add('active');

            if (tabName === 'users') renderUsers();
            if (tabName === 'registrations') renderRegistrations();
            if (tabName === 'payments') renderPayments();
        }

        function handleSearch() {
            const filter = document.getElementById('searchInput').value.trim();
            const activeTab = document.querySelector('.tab.active').textContent.toLowerCase();
            
            if (activeTab.includes('user')) renderUsers(filter);
            else if (activeTab.includes('registration')) renderRegistrations(filter);
            else if (activeTab.includes('payment')) renderPayments(filter);
        }

        // NEW: Mark registration as attended
        async function markAttended(regId, dotElement) {
            if (dotElement.classList.contains('attended')) return; // Already attended
            
            try {
                const data = await adminApiCall('/api/admin/mark-attended', 'POST', { orderId: regId });
                if (data.success) {
                    dotElement.classList.remove('unattended');
                    dotElement.classList.add('attended');
                    dotElement.title = 'Attended';
                    showToast('Marked as attended', 'success');
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function approveRegistration(regId) {
            showLoading(true);
            const note = document.getElementById('note-' + regId)?.value || '';
            
            try {
                const data = await adminApiCall('/api/admin/approve-order', 'POST', {
                    orderId: regId,
                    adminNote: note,
                    adminId: currentAdmin.id
                });

                if (!data.success) throw new Error(data.error);

                showLoading(false);
                showToast('Registration approved!', 'success');
                await loadRegistrations();
                await loadUsers(); // Refresh user wallet counts
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function rejectRegistration(regId) {
            showLoading(true);
            const note = document.getElementById('note-' + regId)?.value || '';
            
            if (!note) {
                showLoading(false);
                showToast('Please add a note explaining the rejection.', 'error');
                return;
            }

            try {
                const data = await adminApiCall('/api/admin/reject-order', 'POST', {
                    orderId: regId,
                    adminNote: note,
                    adminId: currentAdmin.id
                });

                if (!data.success) throw new Error(data.error);

                showLoading(false);
                showToast('Registration rejected.', 'success');
                await loadRegistrations();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function suspendUser(userId) {
            if (!confirm('Are you sure you want to suspend this user?')) return;
            
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/suspend-user', 'POST', { userId });
                if (!data.success) throw new Error(data.error);
                
                showLoading(false);
                showToast('User suspended', 'success');
                await loadUsers();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function enableUser(userId) {
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/enable-user', 'POST', { userId });
                if (!data.success) throw new Error(data.error);
                
                showLoading(false);
                showToast('User resumed', 'success');
                await loadUsers();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function deleteUser(userId) {
            if (!confirm('WARNING: This will permanently delete the user. Continue?')) return;
            if (!confirm('Are you absolutely sure? This cannot be undone.')) return;
            
            showLoading(true);
            try {
                const data = await adminApiCall('/api/admin/delete-user', 'POST', { userId });
                if (!data.success) throw new Error(data.error);
                
                showLoading(false);
                showToast('User deleted', 'success');
                await loadUsers();
                await loadRegistrations();
            } catch (error) {
                showLoading(false);
                showToast('Error: ' + error.message, 'error');
            }
        }

        function openImgModal(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('imgModal').classList.add('show');
        }

        function closeImgModal() {
            document.getElementById('imgModal').classList.remove('show');
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('show', show);
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast toast-' + (type || 'success');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeImgModal();
        });
    </script>
</body>
</html>
